<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>hotspot — glyphcss HTML</title>
  <script type="module">import "glyphcss/elements";</script>
  <style>
    html, body { margin: 0; height: 100%; background: #111; }
    glyph-perspective-camera { display: block; width: 100%; height: 100vh; }
    glyph-scene { display: block; width: 100%; height: 100%; }
    .hotspot-label {
      cursor: pointer;
      background: #ff6644;
      color: #fff;
      padding: 2px 6px;
      border-radius: 4px;
      font-size: 12px;
      white-space: nowrap;
    }
  </style>
</head>
<body>
  <glyph-perspective-camera rot-x="1.13" rot-y="0.785" zoom="0.25" distance="100">
    <glyph-scene auto-size>
      <glyph-orbit-controls></glyph-orbit-controls>
      <glyph-mesh geometry="cube" color="#4488ff"></glyph-mesh>
      <glyph-hotspot at="-0.5,-0.5,0.5">
        <div class="hotspot-label">corner</div>
      </glyph-hotspot>
    </glyph-scene>
  </glyph-perspective-camera>
  <script type="module">
    document.querySelector("glyph-hotspot").addEventListener("click", () => alert("corner"));
  </script>
</body>
</html>
