<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>VoxCSS Renderer Test</title>
  <meta name="viewport" content="width=800, initial-scale=1" />
  <script type="importmap">
    {
      "imports": {
        "react": "https://esm.sh/react@18.2.0",
        "react/jsx-runtime": "https://esm.sh/react@18.2.0/jsx-runtime",
        "react-dom/client": "https://esm.sh/react-dom@18.2.0/client",
        "vue": "https://unpkg.com/vue@3.5.12/dist/vue.esm-browser.prod.js"
      }
    }
  </script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #1a1a2e; overflow: hidden; }
    #scene { width: 800px; height: 600px; display: flex; align-items: center; justify-content: center; position: relative; }
  </style>
</head>
<body>
  <div id="scene"></div>
  <script type="module">
    const params = new URLSearchParams(location.search);
    const renderer = params.get("renderer") || "headless";
    const zoom = Number(params.get("zoom")) || 1.4;
    const rotX = Number(params.get("rotX")) || 65;
    const rotY = Number(params.get("rotY")) || 45;
    const pan = Number(params.get("pan")) || 0;
    const tilt = Number(params.get("tilt")) || 0;
    const rows = Number(params.get("rows")) || 8;
    const cols = Number(params.get("cols")) || 8;
    const depth = Number(params.get("depth")) || 6;
    const showFloor = params.get("showFloor") !== "false";
    const showWalls = params.get("showWalls") !== "false";
    const merge = params.get("merge") || "off";
    const model = params.get("model") || "base";

    const baseVoxels = [
      { shape: "spike", x: 7, y: 7, z: 0, rot: 90 },
      { shape: "ramp", x: 6, y: 7, z: 0 },
      { shape: "ramp", x: 5, y: 7, z: 0 },
      { shape: "spike", x: 4, y: 7, z: 0 },
      { shape: "ramp", x: 7, y: 6, z: 0, rot: 90 },
      { shape: "cube", x: 6, y: 6, z: 0 },
      { shape: "cube", x: 5, y: 6, z: 0 },
      { shape: "ramp", x: 4, y: 6, z: 0, rot: 270 },
      { shape: "ramp", x: 7, y: 5, z: 0, rot: 90 },
      { shape: "cube", x: 6, y: 5, z: 0 },
      { shape: "cube", x: 5, y: 5, z: 0 },
      { shape: "spike", x: 2, y: 5, z: 0 },
      { shape: "ramp", x: 7, y: 4, z: 0, rot: 90 },
      { shape: "cube", x: 6, y: 4, z: 0 },
      { shape: "cube", x: 5, y: 4, z: 0 },
      { shape: "cube", x: 4, y: 4, z: 0 },
      { shape: "cube", x: 3, y: 4, z: 0 },
      { shape: "ramp", x: 3, y: 5, z: 0 },
      { shape: "ramp", x: 7, y: 3, z: 0, rot: 90 },
      { shape: "cube", x: 6, y: 3, z: 0 },
      { shape: "cube", x: 5, y: 3, z: 0 },
      { shape: "cube", x: 4, y: 3, z: 0 },
      { shape: "cube", x: 3, y: 3, z: 0 },
      { shape: "ramp", x: 2, y: 3, z: 0, rot: 270 },
      { shape: "spike", x: 7, y: 2, z: 0, rot: 180 },
      { shape: "ramp", x: 6, y: 2, z: 0, rot: 180 },
      { shape: "ramp", x: 5, y: 2, z: 0, rot: 180 },
      { shape: "ramp", x: 4, y: 2, z: 0, rot: 180 },
      { shape: "ramp", x: 3, y: 2, z: 0, rot: 180 },
      { shape: "spike", x: 2, y: 2, z: 0, rot: 270 },
      { shape: "ramp", x: 2, y: 4, z: 0, rot: 270 },
      { shape: "wedge", x: 4, y: 5, z: 0 },
      { shape: "ramp", x: 4, y: 4, z: 1 },
      { shape: "spike", x: 3, y: 4, z: 1 },
      { shape: "ramp", x: 4, y: 3, z: 1, rot: 180 },
      { shape: "spike", x: 3, y: 3, z: 1, rot: 270 },
      { shape: "spike", x: 5, y: 3, z: 1, rot: 180 },
      { shape: "spike", x: 5, y: 4, z: 1, rot: 90 },
    ];

    const palette = ["#0ea5e9", "#ec4899", "#f97316", "#facc15", "#10b981", "#94a3b8"];

    function getVoxels() {
      if (model === "palette") {
        return baseVoxels.map((v, i) => ({ ...v, color: palette[i % palette.length] }));
      }
      return baseVoxels;
    }

    const mergeOption = merge === "2d" ? "2d" : merge === "3d" ? "3d" : false;
    const voxels = getVoxels();

    const cameraProps = { zoom, rotX, rotY, pan, tilt, interactive: true, perspective: false };
    const sceneProps = { voxels, rows, cols, depth, showFloor, showWalls, mergeVoxels: mergeOption };

    const el = document.getElementById("scene");

    function reportResult(extra = {}) {
      const sceneEl = document.querySelector(".voxcss-scene");
      const cameraEl = document.querySelector(".voxcss-camera");
      const styleEl = document.getElementById("voxcss-base-styles");
      window.__voxcssResult = {
        hasCamera: !!cameraEl,
        cameraRect: cameraEl ? cameraEl.getBoundingClientRect() : null,
        cameraStyle: cameraEl ? cameraEl.style.cssText : "",
        cameraComputed: cameraEl ? { height: getComputedStyle(cameraEl).height, width: getComputedStyle(cameraEl).width, overflow: getComputedStyle(cameraEl).overflow } : null,
        sceneRect: sceneEl ? sceneEl.getBoundingClientRect() : null,
        hasBaseStyles: !!styleEl,
        renderer,
        ready: true,
        sceneFound: !!sceneEl,
        sceneTransform: sceneEl?.style.transform || "",
        sceneWidth: sceneEl?.style.width || "",
        sceneHeight: sceneEl?.style.height || "",
        elementCount: sceneEl ? sceneEl.querySelectorAll("*").length : 0,
        cubes: sceneEl ? sceneEl.querySelectorAll(".voxcss-cube").length : 0,
        faces: sceneEl ? sceneEl.querySelectorAll(".voxcss-cube-face").length : 0,
        layers: sceneEl ? sceneEl.querySelectorAll(".voxcss-layer").length : 0,
        walls: sceneEl ? sceneEl.querySelectorAll(".voxcss-wall").length : 0,
        brushes: sceneEl ? sceneEl.querySelectorAll(".voxcss-brush").length : 0,
        ramps: sceneEl ? sceneEl.querySelectorAll(".voxcss-ramp").length : 0,
        wedges: sceneEl ? sceneEl.querySelectorAll(".voxcss-wedge").length : 0,
        spikes: sceneEl ? sceneEl.querySelectorAll(".voxcss-spike").length : 0,
        sceneHTML: sceneEl ? sceneEl.innerHTML : "",
        firstFace: sceneEl ? (() => { const f = sceneEl.querySelector(".voxcss-cube-face"); return f ? { class: f.className, style: f.style.cssText, computed: { bg: getComputedStyle(f).backgroundColor, display: getComputedStyle(f).display } } : null; })() : null,
        firstCube: sceneEl ? (() => { const c = sceneEl.querySelector(".voxcss-cube"); return c ? { style: c.style.cssText } : null; })() : null,
        firstLayer: sceneEl ? (() => { const l = sceneEl.querySelector(".voxcss-layer"); return l ? { style: l.style.cssText, computed: { display: getComputedStyle(l).display, position: getComputedStyle(l).position } } : null; })() : null,
        ...extra,
      };
    }

    async function renderHeadless() {
      const { renderScene } = await import("../packages/voxcss/dist/index.js");
      renderScene({ element: el, camera: cameraProps, scene: sceneProps });
      await new Promise(r => requestAnimationFrame(() => requestAnimationFrame(r)));
      reportResult();
    }

    async function renderReact() {
      const [React, ReactDOM, vox] = await Promise.all([
        import("https://esm.sh/react@18.2.0"),
        import("https://esm.sh/react-dom@18.2.0/client"),
        import("../packages/voxcss/dist/react/index.js"),
      ]);
      const root = ReactDOM.createRoot(el);
      root.render(
        (React.default ?? React).createElement(
          vox.VoxCamera, cameraProps,
          (React.default ?? React).createElement(vox.VoxScene, sceneProps)
        )
      );
      // Wait for React to commit + compositing
      await new Promise(r => setTimeout(r, 3000));
      reportResult();
    }

    async function renderVue() {
      const [vue, vox] = await Promise.all([
        import("https://unpkg.com/vue@3.5.12/dist/vue.esm-browser.prod.js"),
        import("../packages/voxcss/dist/vue/index.js"),
      ]);
      const state = vue.reactive({ camera: { ...cameraProps }, scene: { ...sceneProps } });
      const app = vue.createApp({
        setup() {
          return () => vue.h(vox.VoxCamera, state.camera, {
            default: () => vue.h(vox.VoxScene, state.scene)
          });
        }
      });
      app.mount(el);
      // Wait for Vue to render + compositing
      await new Promise(r => setTimeout(r, 3000));
      reportResult();
    }

    try {
      if (renderer === "react") await renderReact();
      else if (renderer === "vue") await renderVue();
      else await renderHeadless();
    } catch (err) {
      window.__voxcssResult = { renderer, ready: true, error: err.message };
    }
  </script>
</body>
</html>
