<!doctype html>
<html lang="en">

<head>
  <meta charset="utf-8" />
  <title>VoxCSS · Headless example</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <style>
    body {
      margin: 0;
      height: 100vh;
      background: #000;
    }

    #voxcss {
      height: 100%;
    }
  </style>
</head>

<body>
  <div id="voxcss"></div>

  <script type="module">
    import { renderScene } from "../../dist/index.js";

    const root = document.getElementById("voxcss");

    const voxels = [{ x: 3, y: 3, z: 0, color: "#FACC15" }];

    renderScene({
      element: root,
      camera: { interactive: true, zoom: 1.5, rotX: 65, rotY: 45 },
      scene: {
        voxels,
        rows: 8,
        cols: 8,
        depth: 6,
        showWalls: true,
        showFloor: true
      }
    });
  </script>
</body>

</html>
