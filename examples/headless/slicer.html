<!doctype html>
<html lang="en">

<head>
  <meta charset="utf-8" />
  <title>VoxCSS - Slicer</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <script type="importmap">
    {
      "imports": {
        "react": "https://esm.sh/react@18.2.0",
        "react/jsx-runtime": "https://esm.sh/react@18.2.0/jsx-runtime",
        "react-dom/client": "https://esm.sh/react-dom@18.2.0/client",
        "vue": "https://unpkg.com/vue@3.5.12/dist/vue.esm-browser.prod.js"
      }
    }
  </script>
  <style>
    :root {
      font-family: "Inter", "SF Pro Display", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color-scheme: dark;
      background: #020617;
      --hud-width: min(360px, 90vw);
      --analysis-width: 320px;
      --reference-size: 200px;
      --reference-width: calc(var(--reference-size) + 32px);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background: #020617;
      color: #e2e8f0;
    }

    .slicer-layout {
      display: flex;
      min-height: 100vh;
      width: 100%;
    }

    .slicer-main {
      flex: 1;
      min-width: 0;
      min-height: 0;
      display: flex;
      flex-direction: column;
    }

    .slicer-reference {
      width: var(--reference-width);
      flex-shrink: 0;
      display: flex;
      flex-direction: column;
      gap: 12px;
      padding: 16px;
      border-right: 1px solid #1f2937;
      background: #020617;
      min-height: 0;
    }

    .slicer-reference-title {
      font-size: 0.72rem;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: #94a3b8;
    }

    #voxcss-reference {
      position: relative;
      inset: auto;
      width: 100%;
      max-width: var(--reference-size);
      aspect-ratio: 1 / 1;
      height: auto;
      margin: 0 auto;
      overflow: hidden;
      background: #000000;
      border: 1px solid #334155;
    }

    #voxcss-slice {
      position: fixed;
      top: -9999px;
      left: -9999px;
      width: 1px;
      height: 1px;
      overflow: hidden;
      opacity: 0;
      pointer-events: none;
    }

    .hud {
      position: sticky;
      top: 0;
      left: 0;
      width: 100%;
      display: flex;
      flex-direction: column;
      gap: 16px;
      padding: 16px 24px;
      background: #020617;
      border-bottom: 1px solid #1f2937;
      box-shadow: none;
      overflow-y: auto;
      border-radius: 0;
    }

    .hud-top-actions {
      position: sticky;
      top: 12px;
      z-index: 5;
      display: flex;
      justify-content: flex-end;
      pointer-events: auto;
    }

    .hud-content {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
      gap: 12px 18px;
      padding-top: 0;
    }

    .hud.hud--spacious .hud-content {
      padding-top: 130px;
    }

    .hud h1 {
      margin: 0;
      font-size: 1rem;
      letter-spacing: 0.02em;
    }

    .hud p {
      margin: 0;
      color: #cbd5e1;
      font-size: 0.9rem;
      line-height: 1.35;
    }

    .buttons {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    button {
      appearance: none;
      border: 1px solid #475569;
      border-radius: 0;
      background: #020617;
      color: #e2e8f0;
      padding: 7px 10px;
      cursor: pointer;
      font-size: 0.85rem;
      font-weight: 600;
      transition: border-color 0.2s ease, background 0.2s ease;
      pointer-events: auto;
    }

    button:hover {
      border-color: #38bdf8;
      background: #0f1c2e;
    }

    button.active {
      border-color: #38bdf8;
      background: #0f1c2e;
    }

    .control {
      display: flex;
      flex-direction: column;
      gap: 6px;
      margin: 0;
      min-width: 0;
      pointer-events: auto;
    }

    .hud-section {
      display: flex;
      flex-direction: column;
      gap: 12px;
      padding: 8px 0;
      border-radius: 0;
      background: #020617;
      border-top: 1px solid #334155;
      box-shadow: none;
    }

    .hud-section:first-of-type {
      border-top: none;
      padding-top: 0;
    }

    .hud-section-title {
      font-size: 0.72rem;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: #94a3b8;
      margin-bottom: 0;
    }

    .hud-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px 12px;
      align-items: start;
    }

    .control--span {
      grid-column: 1 / -1;
    }

    .control--toggle label {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      cursor: pointer;
    }

    .control label {
      font-size: 0.78rem;
      color: #cbd5e1;
    }

    .control input[type="range"] {
      width: 100%;
      accent-color: #38bdf8;
      cursor: pointer;
    }

    .control input[type="checkbox"] {
      accent-color: #38bdf8;
    }

    .control select {
      width: 100%;
      padding: 6px 10px;
      border-radius: 0;
      border: 1px solid #475569;
      background: #020617;
      color: #e2e8f0;
      font-size: 0.85rem;
      pointer-events: auto;
    }

    @media (max-width: 520px) {
      .hud-grid {
        grid-template-columns: 1fr;
      }
    }

    @media (max-width: 900px) {
      .slicer-layout {
        flex-direction: column;
      }

      .slicer-reference {
        width: 100%;
        border-right: none;
        border-top: 1px solid #1f2937;
        align-items: center;
      }

      .slice-workspace {
        grid-template-columns: 1fr;
      }

      .slice-analysis {
        border-right: none;
        border-bottom: 1px solid #1f2937;
      }

      .slice-grid {
        padding: 16px 18px 24px;
      }

      #voxcss-reference {
        max-width: 180px;
      }
    }

    .value {
      font-size: 0.82rem;
      color: #94a3b8;
    }

    .status {
      color: #a5b4fc;
      font-size: 0.9rem;
    }

    .status small {
      display: block;
      color: #cbd5e1;
      margin-top: 2px;
    }

    .stats {
      display: flex;
      flex-direction: column;
      gap: 4px;
      position: static;
      align-items: flex-start;
      text-align: left;
      padding: 0 0 12px;
      border-radius: 0;
      background: #020617;
      border-bottom: 1px solid #1f2937;
      box-shadow: none;
    }

    .stats-title {
      font-size: 0.9rem;
      color: #94a3b8;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      margin-bottom: 6px;
    }

    .stats-grid {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 4px 12px;
      margin: 0;
    }

    .stats-kpi {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .stats-kpi-value {
      font-size: clamp(1.8rem, 4.5vw, 3.2rem);
      font-weight: 800;
      letter-spacing: -0.05em;
      line-height: 0.9;
      color: #e2e8f0;
      font-variant-numeric: tabular-nums;
    }

    .stats-grid dt {
      margin: 0;
      font-size: 0.78rem;
      color: #cbd5e1;
    }

    .stats-grid dd {
      margin: 0;
      font-size: 0.78rem;
      color: #e2e8f0;
      font-variant-numeric: tabular-nums;
      text-align: right;
    }

    .stats-grid dd.emph {
      color: #a5b4fc;
      font-weight: 600;
    }

    .stats-grid .stat-subtle {
      color: #64748b;
    }

    .stats-grid .stat-hidden {
      display: none;
    }

    .error {
      color: #fda4af;
    }

    .slice-panel {
      position: relative;
      inset: auto;
      z-index: 12;
      width: auto;
      max-width: none;
      display: flex;
      flex-direction: column;
      background: #020617;
      border: none;
      border-radius: 0;
      box-shadow: none;
      overflow: hidden;
      pointer-events: auto;
      flex: 1;
      min-height: 0;
    }

    .slice-workspace {
      display: grid;
      grid-template-columns: minmax(260px, var(--analysis-width)) minmax(0, 1fr);
      flex: 1;
      min-height: 0;
    }

    .slice-analysis {
      display: flex;
      flex-direction: column;
      gap: 16px;
      padding: 16px 20px 24px;
      border-right: 1px solid #1f2937;
      background: #020617;
      min-height: 0;
      overflow: auto;
    }

    .slice-panel[hidden] {
      display: none;
    }

    body.voxcss-xray-slices #voxcss-slice {
      opacity: 1;
      pointer-events: auto;
    }

    body.voxcss-pe-all * {
      pointer-events: all !important;
    }

    .slice-header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 12px 18px;
      padding: 16px 24px 14px;
      margin: 0;
      border-bottom: 1px solid #1f2937;
      background: #020617;
    }

    .slice-header-info {
      display: flex;
      flex-direction: column;
      gap: 6px;
      min-width: 200px;
    }

    .slice-kpis {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
      gap: 10px 12px;
      padding-bottom: 12px;
      border-bottom: 1px solid #1f2937;
    }

    .slice-kpi {
      padding-top: 8px;
      border-radius: 0;
      border: none;
      border-top: 1px solid #334155;
      background: #020617;
      min-width: 0;
    }

    .slice-kpi-label {
      font-size: 0.7rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: #94a3b8;
    }

    .slice-kpi-value {
      font-size: 1.05rem;
      font-weight: 600;
      color: #e2e8f0;
      margin-top: 2px;
    }

    .slice-title {
      font-size: 0.85rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: #cbd5e1;
    }

    .slice-meta {
      font-size: 0.78rem;
      color: #94a3b8;
      text-align: left;
    }

    .slice-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      align-items: center;
    }

    .slice-actions .control {
      margin: 0;
    }

    .slice-actions .control label {
      margin-bottom: 4px;
      display: block;
    }

    .slice-grid {
      flex: 1;
      overflow: auto;
      padding: 16px 24px 24px;
      margin: 0;
      display: flex;
      flex-direction: column;
      gap: 16px;
      min-height: 0;
    }

    .slice-row {
      display: flex;
      flex-direction: column;
      gap: 12px;
      padding: 12px;
      border-radius: 0;
      border: 1px solid #334155;
      background: #020617;
    }

    .slice-row.is-selected {
      border-color: #38bdf8;
    }

    .slice-row[data-worst="true"] {
      box-shadow: none;
    }

    .slice-row[data-worst="true"] .slice-row-label {
      color: #fdba74;
    }

    .slice-row-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
    }

    .slice-row-label {
      font-size: 0.78rem;
      color: #e2e8f0;
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }

    .slice-row-badges {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
    }

    .slice-badge {
      font-size: 0.68rem;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      color: #0f172a;
      background: #f8fafc;
      border-radius: 0;
      padding: 2px 6px;
    }

    .slice-badge.badge-worst {
      background: #fdba74;
    }

    .slice-badge.badge-fallback {
      background: #fca5a5;
    }

    .slice-stats {
      font-size: 0.72rem;
      color: #94a3b8;
      letter-spacing: 0.02em;
    }

    .slice-row-metrics {
      display: flex;
      flex-wrap: wrap;
      gap: 6px 10px;
      color: #cbd5e1;
      font-size: 0.72rem;
      letter-spacing: 0.02em;
    }

    .slice-row-metrics span {
      padding: 0;
      border-radius: 0;
      background: #020617;
      border: none;
      white-space: nowrap;
    }

    .slice-preview {
      position: relative;
      margin-top: 8px;
      border-radius: 0;
      border: none;
      background: #020617;
      overflow: hidden;
    }

    .slice-metrics {
      margin-top: 4px;
      font-size: 0.7rem;
      color: #94a3b8;
      letter-spacing: 0.02em;
    }

    .slice-preview-content {
      position: absolute;
      top: 0;
      left: 0;
      transform-origin: top left;
    }

    .slice-preview-rotator {
      position: absolute;
      top: 0;
      left: 0;
      transform-origin: top left;
    }

    .slice-scene {
      position: absolute;
      top: 0;
      left: 0;
      background-color: #020617;
      z-index: 1;
    }

    .slice-grid-overlay {
      position: absolute;
      inset: 0;
      background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='20' height='20' viewBox='0 0 20 20'><rect width='20' height='20' fill='none'/><path d='M20 0H0V20' fill='none' stroke='%23334155' stroke-width='1'/></svg>");
      background-size: var(--voxcss-grid-x, 20px) var(--voxcss-grid-y, 20px);
      background-repeat: repeat;
      pointer-events: none;
      z-index: 2;
    }

    .slice-scene>* {
      z-index: 1;
    }

    .slice-scene .voxcss-layer,
    .slice-scene .voxcss-plane,
    .slice-scene .voxcss-brush {
      transform: none !important;
    }

    .slice-scene .voxcss-layer>* {
      outline: 4px solid #ef4444;
      outline-offset: -4px;
    }

    .slice-scene .voxcss-plane,
    .slice-scene .voxcss-brush {
      outline: 4px solid #ef4444;
      outline-offset: -4px;
    }

    .slice-scene .voxcss-plane::before,
    .slice-scene .voxcss-plane::after,
    .slice-scene .voxcss-brush::before,
    .slice-scene .voxcss-brush::after,
    .slice-scene .voxcss-cube-face::before,
    .slice-scene .voxcss-cube-face::after,
    .slice-scene .voxcss-shape-inner::before,
    .slice-scene .voxcss-shape-inner::after {
      outline: 3px solid #3b82f6;
      outline-offset: -3px;
      background-color: transparent;
    }

    .slice-scene .voxcss-plane::after,
    .slice-scene .voxcss-brush::after,
    .slice-scene .voxcss-cube-face::after,
    .slice-scene .voxcss-shape-inner::after {
      outline: 3px solid #10b981;
      outline-offset: -3px;
      background-color: transparent;
    }

    .voxcss-plane {
      pointer-events: none !important;
    }

    .slice-scene .voxcss-floor-x,
    .slice-scene .voxcss-floor-y,
    .slice-scene .voxcss-floor-z {
      position: relative;
      inset: auto;
      transform: none !important;
    }

    body.voxcss-xray-slices .slice-scene .voxcss-floor-z {
      background-color: transparent !important;
    }


    .voxcss-scene.voxcss-debug-plane-outline .voxcss-brush {
      outline: 3px solid #ef4444 !important;
      outline-offset: -3px;
      background-color: transparent !important;
      pointer-events: all !important;
    }

    .voxcss-scene.voxcss-debug-plane-outline .voxcss-brush::before {
      outline: 3px solid #10b981 !important;
      outline-offset: -3px;
      background-color: transparent !important;
    }

    .voxcss-scene.voxcss-debug-plane-outline .voxcss-brush::after {
      outline: 3px solid #3b82f6 !important;
      outline-offset: -3px;
      background-color: transparent !important;
    }

    .voxcss-scene.voxcss-plane-xray[data-xray-axis="z"] .voxcss-cube-face--fr,
    .voxcss-scene.voxcss-plane-xray[data-xray-axis="z"] .voxcss-cube-face--fl,
    .voxcss-scene.voxcss-plane-xray[data-xray-axis="z"] .voxcss-cube-face--bl,
    .voxcss-scene.voxcss-plane-xray[data-xray-axis="z"] .voxcss-cube-face--br,
    .voxcss-scene.voxcss-plane-xray[data-xray-axis="z"] .voxcss-plane--fr,
    .voxcss-scene.voxcss-plane-xray[data-xray-axis="z"] .voxcss-plane--fl,
    .voxcss-scene.voxcss-plane-xray[data-xray-axis="z"] .voxcss-plane--bl,
    .voxcss-scene.voxcss-plane-xray[data-xray-axis="z"] .voxcss-plane--br {
      display: none !important;
    }

    .voxcss-scene.voxcss-plane-xray[data-xray-axis="x"] .voxcss-cube-face--t,
    .voxcss-scene.voxcss-plane-xray[data-xray-axis="x"] .voxcss-cube-face--b,
    .voxcss-scene.voxcss-plane-xray[data-xray-axis="x"] .voxcss-cube-face--fr,
    .voxcss-scene.voxcss-plane-xray[data-xray-axis="x"] .voxcss-cube-face--bl,
    .voxcss-scene.voxcss-plane-xray[data-xray-axis="x"] .voxcss-plane--t,
    .voxcss-scene.voxcss-plane-xray[data-xray-axis="x"] .voxcss-plane--b,
    .voxcss-scene.voxcss-plane-xray[data-xray-axis="x"] .voxcss-plane--fr,
    .voxcss-scene.voxcss-plane-xray[data-xray-axis="x"] .voxcss-plane--bl {
      display: none !important;
    }

    .voxcss-scene.voxcss-plane-xray[data-xray-axis="y"] .voxcss-cube-face--t,
    .voxcss-scene.voxcss-plane-xray[data-xray-axis="y"] .voxcss-cube-face--b,
    .voxcss-scene.voxcss-plane-xray[data-xray-axis="y"] .voxcss-cube-face--fl,
    .voxcss-scene.voxcss-plane-xray[data-xray-axis="y"] .voxcss-cube-face--br,
    .voxcss-scene.voxcss-plane-xray[data-xray-axis="y"] .voxcss-plane--t,
    .voxcss-scene.voxcss-plane-xray[data-xray-axis="y"] .voxcss-plane--b,
    .voxcss-scene.voxcss-plane-xray[data-xray-axis="y"] .voxcss-plane--fl,
    .voxcss-scene.voxcss-plane-xray[data-xray-axis="y"] .voxcss-plane--br {
      display: none !important;
    }

    .voxcss-scene.voxcss-plane-xray .voxcss-brush,
    .slice-scene.voxcss-plane-xray .voxcss-brush {
      background-color: transparent !important;
    }
  </style>
</head>

<body>
  <div class="slicer-layout">
    <aside class="slicer-reference">
      <div class="slicer-reference-title">3D Reference</div>
      <div id="voxcss-reference"></div>
    </aside>
    <div class="slicer-main">
      <div class="hud">
        <div class="hud-content">
          <div class="hud-section">
            <div class="hud-section-title">Setup</div>
            <div class="control">
              <label>Model</label>
              <div class="buttons" id="model-buttons">
                <button type="button" data-model="/examples/models/army.vox">army</button>
                <button type="button" data-model="/examples/models/bus.vox">bus</button>
                <button type="button" data-model="/examples/models/house.vox">house</button>
                <button type="button" data-model="/examples/models/skyscraper.vox">sky</button>
                <button type="button" data-model="/examples/models/tank.vox">tank</button>
              </div>
            </div>
            <div class="hud-grid">
              <div class="control">
                <label for="preset-select">Preset</label>
                <select id="preset-select">
                  <option value="" selected>Select a preset...</option>
                </select>
              </div>
              <div class="control">
                <label>Floor</label>
                <div class="buttons">
                  <button type="button" id="floor-toggle">Toggle floor</button>
                </div>
              </div>
              <div class="control control--span">
                <label>Merge voxels</label>
                <div class="buttons" id="merge-modes">
                  <button type="button" data-merge="off">Off</button>
                  <button type="button" data-merge="2d">2D</button>
                  <button type="button" data-merge="3d">3D</button>
                </div>
              </div>
            </div>
          </div>
          <div class="hud-section">
            <div class="hud-section-title">View</div>
            <div class="control">
              <label>Camera</label>
              <div class="buttons" id="camera-buttons">
                <button type="button" data-camera="iso">Iso</button>
                <button type="button" data-camera="left">Left</button>
                <button type="button" data-camera="right">Right</button>
                <button type="button" data-camera="top">Top</button>
              </div>
            </div>
            <div class="control">
              <label for="zoom">Zoom <span class="value" id="zoom-value"></span></label>
              <input id="zoom" type="range" min="0.01" max="2.4" step="0.01" />
            </div>
            <div class="control control--toggle">
              <label for="animate">
                <input id="animate" type="checkbox" />
                Animate camera
              </label>
            </div>
          </div>
          <div class="hud-section">
            <div class="hud-section-title">Debug + Render</div>
            <div class="control">
              <label>Inspect</label>
              <div class="buttons">
                <button type="button" id="plane-outline">Plane outline</button>
              </div>
            </div>
            <div class="control">
              <label>Renderer</label>
              <div class="buttons" id="renderer-modes">
                <button type="button" data-renderer="headless">Headless</button>
                <button type="button" data-renderer="react">React</button>
                <button type="button" data-renderer="vue">Vue</button>
              </div>
            </div>
            <div class="hud-grid">
              <div class="control">

  <script type="module">
    import { parseMagicaVoxel, renderScene, createCamera, mergeVoxels } from "../../dist/index.js";

    const referenceRoot = document.getElementById("voxcss-reference");
    const sliceRoot = document.getElementById("voxcss-slice");
    const root = sliceRoot ?? referenceRoot;
    const fileInput = document.getElementById("file-input");
    const statsEl = document.getElementById("stats");
    const statTotalEl = document.getElementById("stat-total");
    const statBrushesEl = document.getElementById("stat-brushes");
    const statBrushesPseudosEl = document.getElementById("stat-brushes-pseudos");
    const statBrushesGradientsEl = document.getElementById("stat-brushes-gradients");
    const statPaintCostEl = document.getElementById("stat-paint-cost");
    const statWastedPaintEl = document.getElementById("stat-wasted-paint");
    const statCompositeEl = document.getElementById("stat-composite");
    const statStampsEl = document.getElementById("stat-stamps");
    const statSvgsEl = document.getElementById("stat-svgs");
    const statCubeFaceEl = document.getElementById("stat-cube-faces");
    const statCubeEl = document.getElementById("stat-cubes");
    const statLayerEl = document.getElementById("stat-layers");
    const statFpsEl = document.getElementById("stat-fps");
    const zoomInput = document.getElementById("zoom");
    const zoomValue = document.getElementById("zoom-value");
    const presetSelect = document.getElementById("preset-select");
    const modelButtons = document.getElementById("model-buttons");
    const cameraButtons = document.getElementById("camera-buttons");
    const animateInput = document.getElementById("animate");
    const mergeModes = document.getElementById("merge-modes");
    const rendererModes = document.getElementById("renderer-modes");
    const engineSelect = document.getElementById("engine-select");
    const hudPanel = document.querySelector(".hud");
    const viewModes = document.getElementById("view-modes");
    const planeXrayControls = document.getElementById("plane-xray-controls");
    const planeXrayAxisButtons = document.getElementById("plane-xray-axis");
    const openXrayButton = document.getElementById("open-xray");
    const hudPaddingToggleButton = document.getElementById("hud-padding-toggle");
    const slicePanel = document.getElementById("slice-panel");
    const sliceMeta = document.getElementById("slice-meta");
    const sliceKpis = document.getElementById("slice-kpis");
    const sliceGrid = document.getElementById("slice-grid");
    const planeOutlineButton = document.getElementById("plane-outline");
    const floorToggleButton = document.getElementById("floor-toggle");

    const SAMPLE = buildSampleCube(2);
    const DEFAULT_MODEL_URL = "/examples/models/army.vox";

    let rendererMode = "headless";
    let engineMode = "slice";
    let lastEngineMode = engineMode;
    let mountedRenderer = null;
    let referenceRenderer = null;
    let renderSeq = 0;

    let reactRuntimePromise = null;
    let vueRuntimePromise = null;

    let lastData = SAMPLE;
    let lastLabel = SAMPLE.label;
    let currentZoom = null;
    let mergeMode = "3d";
    const projection = "cubic";
    let animate = false;
    let planeOutline = false;
    let showFloor = false;
    let cameraPreset = "iso";
    let viewMode = "xray";
    let planeXrayAxis = "x";

    const XRAY_SPACING = 3;
    const BASE_TILE_SIZE = 50;
    const SLICE_FACE_OFFSETS = {
      t: 0.12,
      b: 0.12,
      fr: -0.12,
      fl: -0.12,
      br: 0.12,
      bl: 0.12
    };

    const stripVoxExtension = (value) => {
      if (!value) return "";
      const lower = value.toLowerCase();
      if (lower.endsWith(".vox")) return value.slice(0, -4);
      if (lower.endsWith(".json")) return value.slice(0, -5);
      return value;
    };

    function setStat(el, value) {
      if (!el) return;
      el.textContent = Number.isFinite(value) ? String(value) : String(value ?? "");
    }

    const FPS_SAMPLE_WINDOW = 1000;
    let fpsFrameId = null;
    let fpsFrames = 0;
    let fpsSampleStart = 0;

    function setFpsValue(value) {
      if (!statFpsEl) return;
      if (!Number.isFinite(value)) {
        statFpsEl.textContent = "-";
        return;
      }
      statFpsEl.textContent = String(Math.round(value));
    }

    function fpsTick(now) {
      if (fpsFrameId === null) return;
      if (!fpsSampleStart) fpsSampleStart = now;
      fpsFrames += 1;
      const elapsed = now - fpsSampleStart;
      if (elapsed >= FPS_SAMPLE_WINDOW) {
        setFpsValue((fpsFrames * 1000) / elapsed);
        fpsFrames = 0;
        fpsSampleStart = now;
      }
      fpsFrameId = requestAnimationFrame(fpsTick);
    }

    function startFpsMonitor() {
      if (!statFpsEl || fpsFrameId !== null) return;
      if (typeof requestAnimationFrame !== "function") return;
      fpsFrames = 0;
      fpsSampleStart = 0;
      fpsFrameId = requestAnimationFrame(fpsTick);
    }

    function stopFpsMonitor() {
      if (fpsFrameId === null) return;
      if (typeof cancelAnimationFrame === "function") {
        cancelAnimationFrame(fpsFrameId);
      }
      fpsFrameId = null;
      fpsFrames = 0;
      fpsSampleStart = 0;
      setFpsValue(Number.NaN);
    }

    function getSliceBrushCounts(report) {
      const slices = Array.isArray(report?.slices) ? report.slices : [];
      const renderStats = report?.renderStats;
      if (renderStats && Number.isFinite(renderStats.brushNodes)) {
        const brushBase = Number.isFinite(renderStats.brushBase) ? renderStats.brushBase : 0;
        const brushCombo = Number.isFinite(renderStats.brushCombo) ? renderStats.brushCombo : 0;
        const brush = Number.isFinite(renderStats.brush) ? renderStats.brush : brushBase + brushCombo;
        const stamp = Number.isFinite(renderStats.brushStamp) ? renderStats.brushStamp : 0;
        const svg = Number.isFinite(renderStats.brushSvg) ? renderStats.brushSvg : 0;
        const gradient = Number.isFinite(renderStats.brushGradient) ? renderStats.brushGradient : 0;
        const total = Number.isFinite(renderStats.brushNodes)
          ? renderStats.brushNodes
          : brush + stamp + svg;
        const pseudoLayers = Number.isFinite(renderStats.pseudoLayers) ? renderStats.pseudoLayers : 0;
        return {
          brush,
          total,
          stamp,
          svg,
          gradient,
          pseudoLayers
        };
      }
      if (!slices.length) return null;
      let brush = 0;
      let stamp = 0;
      let svg = 0;
      let total = 0;
      let gradient = 0;
      for (const slice of slices) {
        if (!slice) continue;
        const sliceBrush = Number.isFinite(slice.brush) ? slice.brush : 0;
        const sliceStamp = Number.isFinite(slice.stamp) ? slice.stamp : 0;
        const sliceSvg = Number.isFinite(slice.svg) ? slice.svg : 0;
        const sliceGradient = Number.isFinite(slice.gradient) ? slice.gradient : 0;
        const sliceTotal = Number.isFinite(slice.brushTotal)
          ? slice.brushTotal
          : sliceBrush + sliceStamp + sliceSvg;
        brush += sliceBrush;
        stamp += sliceStamp;
        svg += sliceSvg;
        total += sliceTotal;
        gradient += sliceGradient;
      }
      const pseudoLayers = Number.isFinite(report?.renderStats?.pseudoLayers) ? report.renderStats.pseudoLayers : 0;
      return {
        brush,
        total,
        stamp,
        svg,
        gradient,
        pseudoLayers
      };
    }

    function updateDomStats(stats) {
      if (!statsEl) return;
      if (!stats) {
        setStat(statTotalEl, 0);
        setStat(statBrushesEl, 0);
        setStat(statBrushesPseudosEl, 0);
        setStat(statBrushesGradientsEl, 0);
        setStat(statPaintCostEl, "-");
        setStat(statWastedPaintEl, "-");
        setStat(statCompositeEl, "-");
        setStat(statStampsEl, 0);
        setStat(statSvgsEl, 0);
        setStat(statCubeFaceEl, 0);
        setStat(statCubeEl, 0);
        setStat(statLayerEl, 0);
        statCubeFaceEl?.classList.remove("stat-hidden");
        statCubeEl?.classList.remove("stat-hidden");
        statLayerEl?.classList.remove("stat-hidden");
        statCubeFaceEl?.previousElementSibling?.classList.remove("stat-hidden");
        statCubeEl?.previousElementSibling?.classList.remove("stat-hidden");
        statLayerEl?.previousElementSibling?.classList.remove("stat-hidden");
        setFpsValue(Number.NaN);
        return;
      }
      const cubeCount = stats.cubes ?? 0;
      const cubeFaceCount = stats.cubeFaces ?? 0;
      const layerCount = stats.layers ?? 0;
      const svgCount = stats.svgs ?? 0;
      const totalBrushCount = stats.totalBrushes ?? 0;
      const brushCount = stats.brushes ?? 0;
      const brushPseudos = stats.brushPseudos ?? 0;
      const brushGradients = stats.brushGradients ?? 0;
      const stampCount = stats.stamps ?? 0;
      const svgBrushCount = stats.svgBrushes ?? svgCount;
      const domCount = stats.totalElements ?? 0;
      const paintCost = Number.isFinite(stats.paintCost) ? Math.round(stats.paintCost) : null;
      const wastedPaint = Number.isFinite(stats.wastedPaint) ? Math.round(stats.wastedPaint) : null;
      const wastedPaintRatio = Number.isFinite(stats.wastedPaintRatio) ? stats.wastedPaintRatio : null;
      const compositeNodes = Number.isFinite(stats.compositeNodes) ? stats.compositeNodes : null;
      setStat(statTotalEl, domCount);
      setStat(statBrushesEl, brushCount);
      setStat(statBrushesPseudosEl, brushPseudos);
      setStat(statBrushesGradientsEl, brushGradients);
      setStat(statPaintCostEl, paintCost ?? "-");
      setStat(
        statWastedPaintEl,
        wastedPaint === null
          ? "-"
          : wastedPaintRatio === null
            ? `${wastedPaint}`
            : `${wastedPaint} (${Math.round(wastedPaintRatio * 100)}%)`
      );
      setStat(statCompositeEl, compositeNodes ?? "-");
      setStat(statStampsEl, stampCount);
      setStat(statSvgsEl, svgBrushCount);
      const hideCubeStats = totalBrushCount > 0;
      statCubeFaceEl?.classList.toggle("stat-hidden", hideCubeStats);
      statCubeEl?.classList.toggle("stat-hidden", hideCubeStats);
      statLayerEl?.classList.toggle("stat-hidden", hideCubeStats);
      statCubeFaceEl?.previousElementSibling?.classList.toggle("stat-hidden", hideCubeStats);
      statCubeEl?.previousElementSibling?.classList.toggle("stat-hidden", hideCubeStats);
      statLayerEl?.previousElementSibling?.classList.toggle("stat-hidden", hideCubeStats);
      setStat(statCubeFaceEl, cubeFaceCount);
      setStat(statCubeEl, cubeCount);
      setStat(statLayerEl, layerCount);
    }

    function computeZoom(data) {
      const maxDim = Math.max(data.rows || 1, data.cols || 1, data.depth || 1);
      const target = 14;
      const scaled = (target / Math.max(4, maxDim)) * 0.4;
      return Math.max(0.1, Math.min(0.25, scaled));
    }

    function resolveDimensions(data) {
      const voxels = data?.voxels ?? [];
      let maxX = 0;
      let maxY = 0;
      let maxZ = 0;
      for (const voxel of voxels) {
        if (!voxel) continue;
        const x2 = Number.isFinite(voxel.x2) ? voxel.x2 : voxel.x + 1;
        const y2 = Number.isFinite(voxel.y2) ? voxel.y2 : voxel.y + 1;
        const z2 = Number.isFinite(voxel.z2) ? voxel.z2 : voxel.z + 1;
        maxX = Math.max(maxX, x2);
        maxY = Math.max(maxY, y2);
        maxZ = Math.max(maxZ, z2);
      }
      const rows = Number.isFinite(data?.rows) ? data.rows : maxX;
      const cols = Number.isFinite(data?.cols) ? data.cols : maxY;
      const depth = Number.isFinite(data?.depth) ? data.depth : maxZ;
      return { rows, cols, depth };
    }

    function parseTranslateZ(transform) {
      if (!transform) return null;
      const match = transform.match(/translateZ\((-?\d+(?:\.\d+)?)px\)/);
      if (!match) return null;
      const value = Number(match[1]);
      return Number.isFinite(value) ? value : null;
    }

    function parseCssPx(value) {
      if (!value) return null;
      const parsed = Number.parseFloat(value);
      return Number.isFinite(parsed) ? parsed : null;
    }

    function getXrayBaseZ(face) {
      const baseTransform = face.dataset.xrayBaseTransform ?? face.style.transform;
      const transformValue = parseTranslateZ(baseTransform);
      if (transformValue !== null) return transformValue;
      const baseZ = face.dataset.xrayBaseZ ?? face.style.getPropertyValue("--vox-z");
      return parseCssPx(baseZ);
    }

    function groupFacesByPlaneWithOffsets(faces) {
      const groups = new Map();
      for (const face of faces) {
        if (!(face instanceof HTMLElement) && !(face instanceof SVGElement)) continue;
        const offset = getXrayBaseZ(face);
        if (offset === null) continue;
        const key = Number(offset.toFixed(3));
        if (!groups.has(key)) groups.set(key, []);
        groups.get(key).push(face);
      }
      return Array.from(groups.entries())
        .sort((a, b) => a[0] - b[0])
        .map(([offset, grouped]) => ({ offset, faces: grouped }));
    }

    function groupFacesByPlane(faces) {
      return groupFacesByPlaneWithOffsets(faces).map((entry) => entry.faces);
    }

    function resolveLayerElevation(sceneEl) {
      if (!sceneEl) return BASE_TILE_SIZE;
      const cameraEl = sceneEl.closest(".voxcss-camera") ?? sceneEl.parentElement;
      if (!cameraEl) return BASE_TILE_SIZE;
      const value = getComputedStyle(cameraEl).getPropertyValue("--voxcss-layer-elevation");
      const parsed = Number.parseFloat(value);
      return Number.isFinite(parsed) ? parsed : BASE_TILE_SIZE;
    }

    function getZSlicePaintedCounts(dims, voxels) {
      const rows = Math.max(0, Math.floor(dims.rows ?? 0));
      const cols = Math.max(0, Math.floor(dims.cols ?? 0));
      const depth = Math.max(0, Math.floor(dims.depth ?? 0));
      const sets = Array.from({ length: depth }, () => new Set());
      for (const voxel of voxels ?? []) {
        if (!voxel) continue;
        const x0 = Math.max(0, Math.floor(voxel.x));
        const x1 = Math.max(x0, Math.floor(Number.isFinite(voxel.x2) ? voxel.x2 : voxel.x + 1));
        const y0 = Math.max(0, Math.floor(voxel.y));
        const y1 = Math.max(y0, Math.floor(Number.isFinite(voxel.y2) ? voxel.y2 : voxel.y + 1));
        const z0 = Math.max(0, Math.floor(voxel.z));
        const z1 = Math.max(z0, Math.floor(Number.isFinite(voxel.z2) ? voxel.z2 : voxel.z + 1));
        const xStart = Math.min(x0, rows);
        const xEnd = Math.min(x1, rows);
        const yStart = Math.min(y0, cols);
        const yEnd = Math.min(y1, cols);
        const zStart = Math.min(z0, depth);
        const zEnd = Math.min(z1, depth);
        if (xStart >= xEnd || yStart >= yEnd || zStart >= zEnd) continue;
        for (let z = zStart; z < zEnd; z += 1) {
          const set = sets[z];
          if (!set) continue;
          for (let x = xStart; x < xEnd; x += 1) {
            for (let y = yStart; y < yEnd; y += 1) {
              set.add(`${x}:${y}`);
            }
          }
        }
      }
      return sets.map((set) => set.size);
    }

    function getXSlicePaintedCounts(dims, voxels) {
      const rows = Math.max(0, Math.floor(dims.rows ?? 0));
      const cols = Math.max(0, Math.floor(dims.cols ?? 0));
      const depth = Math.max(0, Math.floor(dims.depth ?? 0));
      const sets = Array.from({ length: rows }, () => new Set());
      for (const voxel of voxels ?? []) {
        if (!voxel) continue;
        const x0 = Math.max(0, Math.floor(voxel.x));
        const x1 = Math.max(x0, Math.floor(Number.isFinite(voxel.x2) ? voxel.x2 : voxel.x + 1));
        const y0 = Math.max(0, Math.floor(voxel.y));
        const y1 = Math.max(y0, Math.floor(Number.isFinite(voxel.y2) ? voxel.y2 : voxel.y + 1));
        const z0 = Math.max(0, Math.floor(voxel.z));
        const z1 = Math.max(z0, Math.floor(Number.isFinite(voxel.z2) ? voxel.z2 : voxel.z + 1));
        const xStart = Math.min(x0, rows);
        const xEnd = Math.min(x1, rows);
        const yStart = Math.min(y0, cols);
        const yEnd = Math.min(y1, cols);
        const zStart = Math.min(z0, depth);
        const zEnd = Math.min(z1, depth);
        if (xStart >= xEnd || yStart >= yEnd || zStart >= zEnd) continue;
        for (let x = xStart; x < xEnd; x += 1) {
          const set = sets[x];
          if (!set) continue;
          for (let y = yStart; y < yEnd; y += 1) {
            for (let z = zStart; z < zEnd; z += 1) {
              set.add(`${y}:${z}`);
            }
          }
        }
      }
      return sets.map((set) => set.size);
    }

    function getYSlicePaintedCounts(dims, voxels) {
      const rows = Math.max(0, Math.floor(dims.rows ?? 0));
      const cols = Math.max(0, Math.floor(dims.cols ?? 0));
      const depth = Math.max(0, Math.floor(dims.depth ?? 0));
      const sets = Array.from({ length: cols }, () => new Set());
      for (const voxel of voxels ?? []) {
        if (!voxel) continue;
        const x0 = Math.max(0, Math.floor(voxel.x));
        const x1 = Math.max(x0, Math.floor(Number.isFinite(voxel.x2) ? voxel.x2 : voxel.x + 1));
        const y0 = Math.max(0, Math.floor(voxel.y));
        const y1 = Math.max(y0, Math.floor(Number.isFinite(voxel.y2) ? voxel.y2 : voxel.y + 1));
        const z0 = Math.max(0, Math.floor(voxel.z));
        const z1 = Math.max(z0, Math.floor(Number.isFinite(voxel.z2) ? voxel.z2 : voxel.z + 1));
        const xStart = Math.min(x0, rows);
        const xEnd = Math.min(x1, rows);
        const yStart = Math.min(y0, cols);
        const yEnd = Math.min(y1, cols);
        const zStart = Math.min(z0, depth);
        const zEnd = Math.min(z1, depth);
        if (xStart >= xEnd || yStart >= yEnd || zStart >= zEnd) continue;
        for (let y = yStart; y < yEnd; y += 1) {
          const set = sets[y];
          if (!set) continue;
          for (let x = xStart; x < xEnd; x += 1) {
            for (let z = zStart; z < zEnd; z += 1) {
              set.add(`${x}:${z}`);
            }
          }
        }
      }
      return sets.map((set) => set.size);
    }

    function formatCellStats(painted, totalCells) {
      if (!Number.isFinite(totalCells) || totalCells <= 0) {
        return "Cells 0/0";
      }
      const safePainted = Number.isFinite(painted) ? painted : 0;
      const pct = totalCells ? Math.round((safePainted / totalCells) * 1000) / 10 : 0;
      return `Cells ${safePainted}/${totalCells} (${pct.toFixed(1)}%)`;
    }

    function formatDomPerCell(value) {
      if (!Number.isFinite(value) || value <= 0) return "DOM/cell 0.00";
      if (value < 0.01) return "DOM/cell <0.01";
      return `DOM/cell ${value.toFixed(2)}`;
    }

    function formatScore(value) {
      if (!Number.isFinite(value)) return "Score --";
      const clamped = Math.max(0, Math.min(100, value));
      return `Score ${clamped.toFixed(1)}`;
    }

    function getSlicePlaneOffset(axis, plane, tileSize, layerElevation) {
      return axis === "z"
        ? plane * layerElevation
        : -1 * (plane - 1) * tileSize;
    }

    function getSliceOffsetKey(axis, plane, face, tileSize, layerElevation) {
      const faceOffset = SLICE_FACE_OFFSETS[face];
      if (faceOffset === undefined) return null;
      const base = getSlicePlaneOffset(axis, plane, tileSize, layerElevation);
      return Number((base + faceOffset).toFixed(3));
    }

    function buildSliceMetricLookup(slices, axis, tileSize, layerElevation) {
      const map = new Map();
      if (!Array.isArray(slices)) return map;
      for (const slice of slices) {
        if (!slice || slice.axis !== axis) continue;
        const key = getSliceOffsetKey(axis, slice.plane, slice.face, tileSize, layerElevation);
        if (key === null) continue;
        map.set(key, slice);
      }
      return map;
    }

    function buildWorstSliceLookup(worstSlices, axis, tileSize, layerElevation) {
      const set = new Set();
      if (!Array.isArray(worstSlices)) return set;
      for (const slice of worstSlices) {
        if (!slice || slice.axis !== axis) continue;
        const key = getSliceOffsetKey(axis, slice.plane, slice.face, tileSize, layerElevation);
        if (key === null) continue;
        set.add(key);
      }
      return set;
    }

    function summarizeSliceElements(slice) {
      const summary = {
        elements: 0,
        planes: 0,
        brushes: 0,
        cubeFaces: 0,
        svgHosts: 0,
        svgPaths: 0
      };
      if (slice.type === "layer" && slice.node instanceof HTMLElement) {
        summary.planes = slice.node.querySelectorAll(".voxcss-plane").length;
        summary.brushes = slice.node.querySelectorAll(".voxcss-brush").length;
        summary.cubeFaces = slice.node.querySelectorAll(".voxcss-cube-face").length;
        summary.svgHosts = slice.node.querySelectorAll("svg").length;
        summary.svgPaths = slice.node.querySelectorAll("svg path").length;
        summary.elements = summary.planes + summary.brushes + summary.cubeFaces + summary.svgHosts;
        return summary;
      }
      const faces = slice.faces ?? [];
      summary.elements = faces.length;
      for (const face of faces) {
        if (!(face instanceof Element)) continue;
        if (face.classList.contains("voxcss-plane")) summary.planes += 1;
        if (face.classList.contains("voxcss-brush")) summary.brushes += 1;
        if (face.classList.contains("voxcss-cube-face")) summary.cubeFaces += 1;
        if (face instanceof SVGElement) {
          summary.svgHosts += 1;
          summary.svgPaths += face.querySelectorAll("path").length;
        }
      }
      return summary;
    }

    function parseGridArea(value) {
      if (!value) return null;
      const match = value.match(/(-?\d+)\s*\/\s*(-?\d+)\s*\/\s*(-?\d+)\s*\/\s*(-?\d+)/);
      if (!match) return null;
      const r0 = Number(match[1]);
      const c0 = Number(match[2]);
      const r1 = Number(match[3]);
      const c1 = Number(match[4]);
      if (![r0, c0, r1, c1].every((entry) => Number.isFinite(entry))) return null;
      const areaCells = Math.max(0, (r1 - r0) * (c1 - c0));
      return { r0, c0, r1, c1, areaCells };
    }

    function parseGridTemplate(value) {
      if (!value) return null;
      const repeatMatch = value.match(/repeat\(\s*(\d+)\s*,\s*([\d.]+)px\s*\)/);
      if (repeatMatch) {
        return {
          count: Number(repeatMatch[1]),
          sizePx: Number(repeatMatch[2]),
          raw: value
        };
      }
      const parts = value.split(/\s+/).filter(Boolean);
      const sizes = parts.map((part) => Number.parseFloat(part)).filter((entry) => Number.isFinite(entry));
      if (!sizes.length) return null;
      return { count: sizes.length, sizePx: sizes[0], sizes, raw: value };
    }

    function resolveTileSize(sceneEl) {
      if (!sceneEl) return BASE_TILE_SIZE;
      const zHost = sceneEl.querySelector(".voxcss-floor-z");
      if (zHost instanceof HTMLElement) {
        const computed = getComputedStyle(zHost);
        const template = computed.gridTemplateColumns || zHost.style.gridTemplateColumns;
        const parsed = parseGridTemplate(template);
        if (parsed?.sizePx) return parsed.sizePx;
      }
      return BASE_TILE_SIZE;
    }

    function hasCssVar(value) {
      const raw = (value ?? "").trim();
      return !!raw && raw !== "none";
    }

    function getBrushInfo(brush) {
      const gridAreaValue = brush.style.gridArea || getComputedStyle(brush).gridArea;
      const gridArea = parseGridArea(gridAreaValue);
      const beforeValue = brush.style.getPropertyValue("--vox-bc");
      const afterValue = brush.style.getPropertyValue("--vox-ac");
      const before = hasCssVar(beforeValue);
      const after = hasCssVar(afterValue);
      const baseZRaw = brush.dataset.xrayBaseZ ?? brush.style.getPropertyValue("--vox-z");
      const baseZ = parseCssPx(baseZRaw);
      const nestedChildren = Array.from(brush.children).filter((child) =>
        child instanceof HTMLElement && child.classList.contains("voxcss-brush")
      ).length;
      const isNestedChild = brush.parentElement instanceof HTMLElement &&
        brush.parentElement.classList.contains("voxcss-brush");
      return {
        gridAreaValue,
        gridArea,
        baseZRaw,
        baseZ,
        backgroundColor: brush.style.backgroundColor || getComputedStyle(brush).backgroundColor,
        pseudo: { before, after },
        nestedChildren,
        isNestedChild
      };
    }

    function analyzeBrushElements(brushes) {
      const details = [];
      let totalArea = 0;
      let minArea = Number.POSITIVE_INFINITY;
      let maxArea = 0;
      let beforeCount = 0;
      let afterCount = 0;
      let bothCount = 0;
      let noneCount = 0;
      let nestedChildCount = 0;
      let nestedChildrenTotal = 0;
      for (const brush of brushes) {
        if (!(brush instanceof HTMLElement)) continue;
        const info = getBrushInfo(brush);
        details.push(info);
        if (info.pseudo.before) beforeCount += 1;
        if (info.pseudo.after) afterCount += 1;
        if (info.pseudo.before && info.pseudo.after) bothCount += 1;
        if (!info.pseudo.before && !info.pseudo.after) noneCount += 1;
        if (info.isNestedChild) nestedChildCount += 1;
        nestedChildrenTotal += info.nestedChildren;
        if (!info.isNestedChild && info.gridArea?.areaCells) {
          totalArea += info.gridArea.areaCells;
          minArea = Math.min(minArea, info.gridArea.areaCells);
          maxArea = Math.max(maxArea, info.gridArea.areaCells);
        }
      }
      const topLevelCount = Math.max(0, brushes.length - nestedChildCount);
      const avgArea = topLevelCount ? totalArea / topLevelCount : 0;
      return {
        count: brushes.length,
        topLevelCount,
        nestedChildCount,
        nestedChildrenTotal,
        beforeCount,
        afterCount,
        bothCount,
        noneCount,
        totalArea,
        minArea: Number.isFinite(minArea) ? minArea : 0,
        maxArea,
        avgArea,
        details
      };
    }

    function analyzeSvgElements(svgs) {
      const details = [];
      let pathCount = 0;
      let pathBytes = 0;
      for (const svg of svgs) {
        if (!(svg instanceof SVGElement)) continue;
        const paths = Array.from(svg.querySelectorAll("path"));
        let localBytes = 0;
        for (const path of paths) {
          const d = path.getAttribute("d") ?? "";
          localBytes += d.length;
        }
        pathCount += paths.length;
        pathBytes += localBytes;
        details.push({
          viewBox: svg.getAttribute("viewBox"),
          pathCount: paths.length,
          pathBytes: localBytes
        });
      }
      return { count: svgs.length, pathCount, pathBytes, details };
    }

    function collectFaceElementDetails(faces) {
      const details = [];
      for (const face of faces) {
        if (!(face instanceof Element)) continue;
        const tag = face.tagName.toLowerCase();
        const className = face.className;
        const type = face.classList.contains("voxcss-brush")
          ? "brush"
          : face.classList.contains("voxcss-plane")
            ? "plane"
            : face.classList.contains("voxcss-cube-face")
              ? "cube-face"
              : face instanceof SVGElement
                ? "svg"
                : "other";
        const baseZ = getXrayBaseZ(face);
        const gridAreaValue = face instanceof HTMLElement
          ? face.style.gridArea || getComputedStyle(face).gridArea
          : null;
        const gridArea = face instanceof HTMLElement ? parseGridArea(gridAreaValue) : null;
        const dataset = face instanceof HTMLElement || face instanceof SVGElement ? { ...face.dataset } : {};
        const brushInfo = type === "brush" && face instanceof HTMLElement ? getBrushInfo(face) : null;
        const svgInfo = type === "svg" && face instanceof SVGElement ? analyzeSvgElements([face]) : null;
        details.push({
          tag,
          type,
          className,
          baseZ,
          gridAreaValue,
          gridArea,
          dataset,
          brush: brushInfo,
          svg: svgInfo
        });
      }
      return details;
    }

    function collectLayerDetails(layer) {
      if (!(layer instanceof HTMLElement)) return null;
      const childTags = {};
      for (const child of Array.from(layer.children)) {
        const tag = child.tagName.toLowerCase();
        childTags[tag] = (childTags[tag] ?? 0) + 1;
      }
      return {
        className: layer.className,
        childCount: layer.children.length,
        childTags
      };
    }

    function getAxisTotalCells(axis, dims) {
      const rows = Math.max(0, Math.floor(dims.rows ?? 0));
      const cols = Math.max(0, Math.floor(dims.cols ?? 0));
      const depth = Math.max(0, Math.floor(dims.depth ?? 0));
      if (axis === "z") return rows * cols;
      if (axis === "x") return cols * depth;
      return rows * depth;
    }

    function computeVoxelStats(data) {
      const voxels = data?.voxels ?? [];
      let count = 0;
      let volume = 0;
      let minX = Number.POSITIVE_INFINITY;
      let minY = Number.POSITIVE_INFINITY;
      let minZ = Number.POSITIVE_INFINITY;
      let maxX = Number.NEGATIVE_INFINITY;
      let maxY = Number.NEGATIVE_INFINITY;
      let maxZ = Number.NEGATIVE_INFINITY;
      let minSpan = Number.POSITIVE_INFINITY;
      let maxSpan = 0;
      const colors = new Set();
      for (const voxel of voxels) {
        if (!voxel) continue;
        count += 1;
        const x2 = Number.isFinite(voxel.x2) ? voxel.x2 : voxel.x + 1;
        const y2 = Number.isFinite(voxel.y2) ? voxel.y2 : voxel.y + 1;
        const z2 = Number.isFinite(voxel.z2) ? voxel.z2 : voxel.z + 1;
        minX = Math.min(minX, voxel.x);
        minY = Math.min(minY, voxel.y);
        minZ = Math.min(minZ, voxel.z);
        maxX = Math.max(maxX, x2);
        maxY = Math.max(maxY, y2);
        maxZ = Math.max(maxZ, z2);
        const spanX = Math.max(0, x2 - voxel.x);
        const spanY = Math.max(0, y2 - voxel.y);
        const spanZ = Math.max(0, z2 - voxel.z);
        const spanMax = Math.max(spanX, spanY, spanZ);
        minSpan = Math.min(minSpan, spanMax);
        maxSpan = Math.max(maxSpan, spanMax);
        volume += spanX * spanY * spanZ;
        const colorIndex = voxel.colorIndex ?? voxel.color ?? voxel.colorId;
        if (colorIndex !== undefined) colors.add(colorIndex);
      }
      const bounds = Number.isFinite(minX)
        ? { minX, minY, minZ, maxX, maxY, maxZ }
        : { minX: 0, minY: 0, minZ: 0, maxX: 0, maxY: 0, maxZ: 0 };
      return {
        count,
        volume,
        bounds,
        minSpan: Number.isFinite(minSpan) ? minSpan : 0,
        maxSpan,
        uniqueColors: colors.size
      };
    }

    function collectSceneDomStats(sceneEl) {
      if (!sceneEl) return null;
      return {
        totalElements: sceneEl.querySelectorAll("*").length,
        planes: sceneEl.querySelectorAll(".voxcss-plane").length,
        brushes: sceneEl.querySelectorAll(".voxcss-brush").length,
        cubeFaces: sceneEl.querySelectorAll(".voxcss-cube-face").length,
        layers: sceneEl.querySelectorAll(".voxcss-layer").length,
        svgHosts: sceneEl.querySelectorAll("svg").length,
        svgPaths: sceneEl.querySelectorAll("svg path").length,
        shapes: sceneEl.querySelectorAll(".voxcss-shape").length,
        shapeInners: sceneEl.querySelectorAll(".voxcss-shape-inner").length
      };
    }

    function collectSceneDataset(rootEl) {
      if (!(rootEl instanceof HTMLElement)) return null;
      const entries = {};
      for (const [key, value] of Object.entries(rootEl.dataset)) {
        if (!key.startsWith("voxcss")) continue;
        const parsed = Number(value);
        entries[key] = Number.isFinite(parsed) ? parsed : value;
      }
      return entries;
    }

    const DOM_REPORT_NODE_LIMIT = 8192;

    function createDomReportContext() {
      return {
        nodeCount: 0,
        truncatedPath: null,
        stats: {
          totalElements: 0,
          maxDepth: 0,
          textNodeParents: 0,
          textLength: 0,
          totalArea: 0,
          maxArea: 0,
          svgHosts: 0,
          svgPaths: 0,
          planes: 0,
          brushes: 0,
          cubeFaces: 0,
          layers: 0,
          shapes: 0,
          shapeInners: 0,
          classCounts: {},
          tagCounts: {}
        }
      };
    }

    function collectDomStats(element, context, depth, path) {
      if (!(element instanceof Element)) return;
      if (context.nodeCount >= DOM_REPORT_NODE_LIMIT) {
        if (!context.truncatedPath) context.truncatedPath = path;
        return;
      }
      context.nodeCount += 1;
      const stats = context.stats;
      stats.totalElements += 1;
      stats.maxDepth = Math.max(stats.maxDepth, depth);
      const tag = (element.tagName || "").toLowerCase();
      if (tag) {
        stats.tagCounts[tag] = (stats.tagCounts[tag] ?? 0) + 1;
      }
      const classes = Array.from(element.classList ?? []);
      for (const className of classes) {
        stats.classCounts[className] = (stats.classCounts[className] ?? 0) + 1;
      }
      if (tag === "svg") stats.svgHosts += 1;
      if (tag === "path") stats.svgPaths += 1;
      let textLength = 0;
      for (const childNode of Array.from(element.childNodes)) {
        if (childNode.nodeType !== Node.TEXT_NODE) continue;
        const trimmed = (childNode.textContent ?? "").trim();
        if (!trimmed) continue;
        textLength += trimmed.length;
      }
      if (textLength > 0) {
        stats.textNodeParents += 1;
        stats.textLength += textLength;
      }
      const rect =
        typeof element.getBoundingClientRect === "function"
          ? element.getBoundingClientRect()
          : null;
      if (rect && Number.isFinite(rect.width) && Number.isFinite(rect.height)) {
        const area = Math.max(0, rect.width * rect.height);
        stats.totalArea += area;
        stats.maxArea = Math.max(stats.maxArea, area);
      }
      for (let i = 0; i < element.children.length; i += 1) {
        collectDomStats(element.children[i], context, depth + 1, `${path}.${i}`);
        if (context.nodeCount >= DOM_REPORT_NODE_LIMIT) break;
      }
    }

    function getTopEntries(map, limit = 6) {
      return Object.entries(map)
        .sort((a, b) => b[1] - a[1] || a[0].localeCompare(b[0]))
        .slice(0, limit)
        .map(([key, count]) => ({ key, count }));
    }

    function mergeCountMap(target, source) {
      for (const [key, value] of Object.entries(source ?? {})) {
        if (!Number.isFinite(value)) continue;
        target[key] = (target[key] ?? 0) + value;
      }
    }

    function buildDomSummary(cameraReports) {
      const totals = { totalElements: 0, nodeCount: 0, pseudoHosts: 0 };
      const heaviness = {
        totalArea: 0,
        maxArea: 0,
        textLength: 0,
        maxDepth: 0,
        textNodeParents: 0
      };
      const elementTotals = {
        totalElements: 0,
        planes: 0,
        brushes: 0,
        cubeFaces: 0,
        layers: 0,
        svgHosts: 0,
        svgPaths: 0,
        shapes: 0,
        shapeInners: 0
      };
      const classCounts = {};
      const tagCounts = {};
      for (const camera of cameraReports) {
        const cameraTotals = camera.totals ?? {};
        totals.totalElements += cameraTotals.totalElements ?? 0;
        totals.nodeCount += cameraTotals.nodeCount ?? 0;
        totals.pseudoHosts += cameraTotals.pseudoHosts ?? 0;
        const weight = camera.weight ?? {};
        heaviness.totalArea += weight.totalArea ?? 0;
        heaviness.maxArea = Math.max(heaviness.maxArea, weight.maxArea ?? 0);
        heaviness.textLength += weight.textLength ?? 0;
        heaviness.maxDepth = Math.max(heaviness.maxDepth, weight.maxDepth ?? 0);
        heaviness.textNodeParents += weight.textNodeParents ?? 0;
        mergeCountMap(elementTotals, camera.sceneDom);
        mergeCountMap(classCounts, camera.classCounts);
        mergeCountMap(tagCounts, camera.tagCounts);
      }
      const summary = {
        cameraCount: cameraReports.length,
        totals,
        heaviness,
        elementBreakdown: elementTotals,
        uniqueClasses: Object.keys(classCounts).length,
        uniqueTags: Object.keys(tagCounts).length,
        topClasses: getTopEntries(classCounts),
        topTags: getTopEntries(tagCounts)
      };
      return summary;
    }

    function createSliceHostClone(host, faces) {
      const clone = document.createElement("div");
      clone.className = host.className;
      clone.style.display = host.style.display;
      clone.style.gridTemplateColumns = host.style.gridTemplateColumns;
      clone.style.gridTemplateRows = host.style.gridTemplateRows;
      clone.style.width = host.style.width;
      clone.style.height = host.style.height;
      const gridX = host.style.getPropertyValue("--voxcss-grid-x");
      const gridY = host.style.getPropertyValue("--voxcss-grid-y");
      const floorBase = host.style.getPropertyValue("--voxcss-floor-base");
      if (gridX) clone.style.setProperty("--voxcss-grid-x", gridX);
      if (gridY) clone.style.setProperty("--voxcss-grid-y", gridY);
      if (floorBase) clone.style.setProperty("--voxcss-floor-base", floorBase);
      for (const face of faces) {
        if (!(face instanceof HTMLElement) && !(face instanceof SVGElement)) continue;
        const faceClone = face.cloneNode(true);
        const styledClone =
          faceClone instanceof HTMLElement || faceClone instanceof SVGElement ? faceClone : null;
        if (styledClone) {
          const base = face.dataset.xrayBaseTransform ?? face.style.transform;
          if (base) styledClone.style.transform = base;
          const baseZ = face.dataset.xrayBaseZ;
          if (baseZ) styledClone.style.setProperty("--vox-z", baseZ);
        }
        clone.appendChild(faceClone);
      }
      return clone;
    }

    function collectCssText() {
      const sheets = Array.from(document.styleSheets ?? []);
      const blocks = [];
      for (const sheet of sheets) {
        let rules;
        try {
          rules = sheet.cssRules;
        } catch (err) {
          continue;
        }
        if (!rules) continue;
        for (const rule of Array.from(rules)) {
          blocks.push(rule.cssText);
        }
      }
      return blocks.join("\n");
    }

    function downloadDataUrl(dataUrl, filename) {
      const link = document.createElement("a");
      link.href = dataUrl;
      link.download = filename;
      document.body.appendChild(link);
      link.click();
      link.remove();
    }

    async function exportSlicePreview(preview, cssText, filename) {
      const rect = preview.getBoundingClientRect();
      const width = Math.max(1, Math.round(rect.width));
      const height = Math.max(1, Math.round(rect.height));
      const clone = preview.cloneNode(true);
      if (!(clone instanceof HTMLElement)) return;
      clone.style.width = `${width}px`;
      clone.style.height = `${height}px`;
      const wrapper = document.createElement("div");
      wrapper.setAttribute("xmlns", "http://www.w3.org/1999/xhtml");
      wrapper.appendChild(clone);
      const svg = `
        <svg xmlns="http://www.w3.org/2000/svg" width="${width}" height="${height}">
          <foreignObject width="100%" height="100%">
            <style>${cssText}</style>
            ${wrapper.outerHTML}
          </foreignObject>
        </svg>
      `;
      const blob = new Blob([svg], { type: "image/svg+xml;charset=utf-8" });
      const url = URL.createObjectURL(blob);
      try {
        const img = new Image();
        await new Promise((resolve, reject) => {
          img.onload = () => resolve();
          img.onerror = () => reject(new Error("Failed to load slice image."));
          img.src = url;
        });
        const canvas = document.createElement("canvas");
        canvas.width = width;
        canvas.height = height;
        const ctx = canvas.getContext("2d");
        if (!ctx) return;
        ctx.drawImage(img, 0, 0, width, height);
        const dataUrl = canvas.toDataURL("image/png");
        downloadDataUrl(dataUrl, filename);
      } finally {
        URL.revokeObjectURL(url);
      }
    }

    async function exportAllSlices() {
      if (!sliceGrid) return;
      const previews = Array.from(sliceGrid.querySelectorAll(".slice-preview"));
      if (!previews.length) return;
      const cssText = collectCssText();
      let index = 0;
      for (const preview of previews) {
        const card = preview.closest(".slice-card");
        const label = card?.dataset.sliceLabel ?? `slice-${index}`;
        const safeLabel = label.toLowerCase().replace(/[^a-z0-9]+/g, "-").replace(/(^-|-$)/g, "");
        await exportSlicePreview(preview, cssText, `${safeLabel || "slice"}-${index + 1}.png`);
        index += 1;
      }
    }

    function buildSlicePanel() {
      if (!slicePanel || !sliceGrid) return;
      const sceneEl = root ? root.querySelector(".voxcss-scene") : null;
      if (viewMode !== "xray" || !sceneEl) {
        slicePanel.hidden = false;
        sliceGrid.innerHTML = "";
        if (sliceMeta) sliceMeta.textContent = "";
        if (sliceKpis) sliceKpis.innerHTML = "";
        return;
      }
      const dims = resolveDimensions(lastData);
      const layerElevation = resolveLayerElevation(sceneEl);
      const tileSize = resolveTileSize(sceneEl);
      const zPaintedCounts = planeXrayAxis === "z" ? getZSlicePaintedCounts(dims, lastData?.voxels ?? []) : null;
      const xPaintedCounts = planeXrayAxis === "x" ? getXSlicePaintedCounts(dims, lastData?.voxels ?? []) : null;
      const yPaintedCounts = planeXrayAxis === "y" ? getYSlicePaintedCounts(dims, lastData?.voxels ?? []) : null;
      const paintedCounts =
        planeXrayAxis === "z" ? zPaintedCounts : planeXrayAxis === "x" ? xPaintedCounts : yPaintedCounts;
      const slices = [];
      let sliceWidth = 0;
      let sliceHeight = 0;
      let cellWidth = tileSize;
      let cellHeight = tileSize;
      const axisLabel = planeXrayAxis.toUpperCase();
      const sliceReport = window.__voxcssLastSliceRendererReport;
      const sliceMetricLookup = buildSliceMetricLookup(
        sliceReport?.slices,
        planeXrayAxis,
        tileSize,
        layerElevation
      );
      const worstSliceLookup = buildWorstSliceLookup(
        sliceReport?.worstSlices,
        planeXrayAxis,
        tileSize,
        layerElevation
      );
      const rowCount = Math.max(0, Math.floor(dims.rows ?? 0));
      const colCount = Math.max(0, Math.floor(dims.cols ?? 0));
      const depthCount = Math.max(0, Math.floor(dims.depth ?? 0));
      const axisCellCount =
        planeXrayAxis === "z" ? rowCount * colCount : planeXrayAxis === "x" ? colCount * depthCount : rowCount * depthCount;

      if (planeXrayAxis === "z") {
        const zHost = sceneEl.querySelector(".voxcss-floor-z");
        if (zHost instanceof HTMLElement) {
          const layers = Array.from(zHost.querySelectorAll(".voxcss-layer"));
          if (layers.length) {
            sliceWidth = colCount * tileSize;
            sliceHeight = rowCount * tileSize;
            cellWidth = tileSize;
            cellHeight = tileSize;
            layers.forEach((layer, index) => {
              slices.push({
                label: `Z ${index}`,
                type: "layer",
                host: zHost,
                node: layer,
                elements: layer.children.length,
                offset: null
              });
            });
          } else {
            const faces = Array.from(zHost.querySelectorAll(".voxcss-plane, .voxcss-brush, svg"));
            const groups = groupFacesByPlaneWithOffsets(faces);
            sliceWidth = colCount * tileSize;
            sliceHeight = rowCount * tileSize;
            cellWidth = tileSize;
            cellHeight = tileSize;
            groups.forEach((group, index) => {
              slices.push({
                label: `Z ${index}`,
                type: "faces",
                host: zHost,
                faces: group.faces,
                elements: group.faces.length,
                offset: group.offset
              });
            });
          }
        }
      } else if (planeXrayAxis === "x") {
        const xHost = sceneEl.querySelector(".voxcss-floor-x");
        if (xHost instanceof HTMLElement) {
          const faces = Array.from(xHost.querySelectorAll(".voxcss-plane, .voxcss-brush, svg"));
          const groups = groupFacesByPlaneWithOffsets(faces);
          sliceWidth = colCount * tileSize;
          sliceHeight = depthCount * layerElevation;
          cellWidth = tileSize;
          cellHeight = layerElevation;
          groups.forEach((group, index) => {
            slices.push({
              label: `X ${index}`,
              type: "faces",
              host: xHost,
              faces: group.faces,
              elements: group.faces.length,
              offset: group.offset
            });
          });
        }
      } else {
        const yHost = sceneEl.querySelector(".voxcss-floor-y");
        if (yHost instanceof HTMLElement) {
          const faces = Array.from(yHost.querySelectorAll(".voxcss-plane, .voxcss-brush, svg"));
          const groups = groupFacesByPlaneWithOffsets(faces);
          sliceWidth = depthCount * layerElevation;
          sliceHeight = rowCount * tileSize;
          cellWidth = layerElevation;
          cellHeight = tileSize;
          groups.forEach((group, index) => {
            slices.push({
              label: `Y ${index}`,
              type: "faces",
              host: yHost,
              faces: group.faces,
              elements: group.faces.length,
              offset: group.offset
            });
          });
        }
      }

      if (!slices.length) {
        slicePanel.hidden = false;
        sliceGrid.innerHTML = "";
        if (sliceMeta) sliceMeta.textContent = "";
        return;
      }

      slicePanel.hidden = false;
      sliceGrid.innerHTML = "";

      if (sliceKpis) {
        sliceKpis.innerHTML = "";
        const reportSlices = Array.isArray(sliceReport?.slices) ? sliceReport.slices : [];
        let totalBrushes = 0;
        let totalDom = 0;
        let fallbackCount = 0;
        let scoreSum = 0;
        let scoreCount = 0;
        const sceneDomCount = sceneEl ? sceneEl.querySelectorAll("*").length : 0;
        for (const slice of reportSlices) {
          totalBrushes += Number.isFinite(slice.brushTotal)
            ? slice.brushTotal
            : (Number.isFinite(slice.brush) ? slice.brush : 0) +
              (Number.isFinite(slice.stamp) ? slice.stamp : 0) +
              (Number.isFinite(slice.svg) ? slice.svg : 0);
          totalDom += Number.isFinite(slice.domEstimate) ? slice.domEstimate : 0;
          if (slice.fallback) fallbackCount += 1;
          if (Number.isFinite(slice.scoreTotal)) {
            scoreSum += slice.scoreTotal;
            scoreCount += 1;
          }
        }
        const avgScore = scoreCount ? scoreSum / scoreCount : null;
        const renderStats = sliceReport?.renderStats;
        const fallbackPaintCost = Number.isFinite(renderStats?.paintCells) && Number.isFinite(renderStats?.pseudoArea)
          ? renderStats.paintCells + renderStats.pseudoArea
          : null;
        const paintCost = Number.isFinite(renderStats?.paintCost) ? renderStats.paintCost : fallbackPaintCost;
        const wastedPaint = Number.isFinite(renderStats?.wastedPaint) ? renderStats.wastedPaint : null;
        const wastedPaintRatio = Number.isFinite(renderStats?.wastedPaintRatio)
          ? renderStats.wastedPaintRatio
          : null;
        const compositeNodes = Number.isFinite(renderStats?.compositeNodes) ? renderStats.compositeNodes : null;
        const kpis = [
          { label: "Slices", value: String(slices.length) },
          { label: "Scene DOM", value: String(sceneDomCount) },
          { label: "Plan DOM", value: String(totalDom) },
          { label: "Paint cost", value: paintCost !== null ? String(Math.round(paintCost)) : "--" },
          {
            label: "Wasted paint",
            value:
              wastedPaint === null
                ? "--"
                : wastedPaintRatio === null
                  ? String(Math.round(wastedPaint))
                  : `${Math.round(wastedPaint)} (${Math.round(wastedPaintRatio * 100)}%)`
          },
          { label: "Composite", value: compositeNodes !== null ? String(compositeNodes) : "--" },
          { label: "Brushes", value: String(totalBrushes) },
          { label: "Avg Score", value: avgScore !== null ? avgScore.toFixed(1) : "--" },
          { label: "Fallback", value: String(fallbackCount) }
        ];
        for (const kpi of kpis) {
          const card = document.createElement("div");
          card.className = "slice-kpi";
          const label = document.createElement("div");
          label.className = "slice-kpi-label";
          label.textContent = kpi.label;
          const value = document.createElement("div");
          value.className = "slice-kpi-value";
          value.textContent = kpi.value;
          card.appendChild(label);
          card.appendChild(value);
          sliceKpis.appendChild(card);
        }
      }

      const gridWidth = sliceGrid.clientWidth || slicePanel.clientWidth || window.innerWidth;
      const maxWidth = Math.max(1, gridWidth - 64);
      const rotatePreview = planeXrayAxis === "y";
      const previewBaseWidth = rotatePreview ? sliceHeight : sliceWidth;
      const previewBaseHeight = rotatePreview ? sliceWidth : sliceHeight;
      const scale = previewBaseWidth > 0 ? (maxWidth / previewBaseWidth) : 1;
      const scaledWidth = Math.max(1, previewBaseWidth * scale);
      const scaledHeight = Math.max(1, previewBaseHeight * scale);
      const gridLine = Math.max(1, Math.min(10, Math.ceil(1 / Math.max(scale, 0.01))));
      const projectionClass = sceneEl.classList.contains("voxcss-projection--dimetric")
        ? " voxcss-projection--dimetric"
        : "";

      const entries = slices.map((slice, index) => {
        const sliceMetrics = slice.offset !== null ? sliceMetricLookup.get(slice.offset) : null;
        const isWorst = slice.offset !== null && worstSliceLookup.has(slice.offset);
        const painted = sliceMetrics?.paintedCells ?? (paintedCounts ? paintedCounts[index] ?? 0 : 0);
        const totalCells = sliceMetrics?.idealCells ?? axisCellCount;
        const scoreTotal = Number.isFinite(sliceMetrics?.scoreTotal) ? sliceMetrics.scoreTotal : null;
        return { slice, index, sliceMetrics, isWorst, painted, totalCells, scoreTotal };
      });

      if (sliceReport?.slices?.length) {
        entries.sort((a, b) => {
          const aScore = Number.isFinite(a.scoreTotal) ? a.scoreTotal : Number.NEGATIVE_INFINITY;
          const bScore = Number.isFinite(b.scoreTotal) ? b.scoreTotal : Number.NEGATIVE_INFINITY;
          if (aScore !== bScore) return bScore - aScore;
          return a.index - b.index;
        });
      }

      for (const entry of entries) {
        const { slice, sliceMetrics, isWorst, painted, totalCells } = entry;
        const row = document.createElement("div");
        row.className = "slice-row";
        row.dataset.sliceLabel = slice.label;
        if (isWorst) row.dataset.worst = "true";

        const rowTop = document.createElement("div");
        rowTop.className = "slice-row-top";
        const label = document.createElement("div");
        label.className = "slice-row-label";
        label.textContent = slice.label;
        const badges = document.createElement("div");
        badges.className = "slice-row-badges";

        if (isWorst) {
          const badge = document.createElement("span");
          badge.className = "slice-badge badge-worst";
          badge.textContent = "Worst";
          badges.appendChild(badge);
        }

        if (sliceMetrics?.fallback) {
          const badge = document.createElement("span");
          badge.className = "slice-badge badge-fallback";
          badge.textContent = "Fallback";
          badges.appendChild(badge);
        }

        rowTop.appendChild(label);
        rowTop.appendChild(badges);
        row.appendChild(rowTop);

        const statsEl = document.createElement("div");
        statsEl.className = "slice-stats";
        statsEl.textContent = formatCellStats(painted, totalCells);
        row.appendChild(statsEl);

        const metricsRow = document.createElement("div");
        metricsRow.className = "slice-row-metrics";
        const metrics = [];
        if (sliceMetrics) {
          if (Number.isFinite(sliceMetrics.scoreTotal)) metrics.push(formatScore(sliceMetrics.scoreTotal));
          const brush = Number.isFinite(sliceMetrics.brush) ? sliceMetrics.brush : 0;
          const brushStamp = Number.isFinite(sliceMetrics.stamp) ? sliceMetrics.stamp : 0;
          const brushSvg = Number.isFinite(sliceMetrics.svg) ? sliceMetrics.svg : 0;
          const brushGradient = Number.isFinite(sliceMetrics.gradient) ? sliceMetrics.gradient : 0;
          const brushTotal = Number.isFinite(sliceMetrics.brushTotal)
            ? sliceMetrics.brushTotal
            : brush + brushStamp + brushSvg;
          metrics.push(`Total ${brushTotal}`);
          metrics.push(`BRUSH ${brush}`);
          metrics.push(`STAMP ${brushStamp}`);
          metrics.push(`SVG ${brushSvg}`);
          metrics.push(`GRAD ${brushGradient}`);
          if (Number.isFinite(sliceMetrics.uniqueColors)) metrics.push(`Colors ${sliceMetrics.uniqueColors}`);
        } else {
          const elementSummary = summarizeSliceElements(slice);
          metrics.push(`DOM ${elementSummary.elements}`);
          if (elementSummary.planes) metrics.push(`Planes ${elementSummary.planes}`);
          if (elementSummary.brushes) metrics.push(`Brushes ${elementSummary.brushes}`);
          if (elementSummary.cubeFaces) metrics.push(`Faces ${elementSummary.cubeFaces}`);
          if (elementSummary.svgHosts || elementSummary.svgPaths) {
            metrics.push(`SVG ${elementSummary.svgHosts}/${elementSummary.svgPaths}`);
          }
          if (painted > 0 && elementSummary.elements > 0) {
            const domPerCell = elementSummary.elements / painted;
            metrics.push(formatDomPerCell(domPerCell));
          }
        }

        if (!metrics.length) metrics.push("No metrics");
        for (const metric of metrics) {
          const chip = document.createElement("span");
          chip.textContent = metric;
          metricsRow.appendChild(chip);
        }

        row.appendChild(metricsRow);

        if (sliceWidth > 0 && sliceHeight > 0) {
          const preview = document.createElement("div");
          preview.className = "slice-preview";
          preview.style.width = `${scaledWidth.toFixed(2)}px`;
          preview.style.height = `${scaledHeight.toFixed(2)}px`;

          const content = document.createElement("div");
          content.className = "slice-preview-content";
          content.style.width = `${previewBaseWidth}px`;
          content.style.height = `${previewBaseHeight}px`;
          content.style.transform = `scale(${scale})`;

          const rotator = document.createElement("div");
          rotator.className = "slice-preview-rotator";
          rotator.style.width = `${sliceWidth}px`;
          rotator.style.height = `${sliceHeight}px`;
          if (rotatePreview) {
            rotator.style.transform = `translate(${sliceHeight}px, 0) rotate(90deg)`;
          }

          const scene = document.createElement("div");
          scene.className = `slice-scene voxcss-plane-xray${projectionClass}`;
          scene.dataset.xrayAxis = planeXrayAxis;
          scene.style.width = `${sliceWidth}px`;
          scene.style.height = `${sliceHeight}px`;
          scene.style.setProperty("--voxcss-rows", String(dims.rows));
          scene.style.setProperty("--voxcss-cols", String(dims.cols));
          scene.style.setProperty("--voxcss-layer-elevation", `${layerElevation}px`);
          scene.style.setProperty("--voxcss-grid-x", `${cellWidth}px`);
          scene.style.setProperty("--voxcss-grid-y", `${cellHeight}px`);

          const gridOverlay = document.createElement("div");
          gridOverlay.className = "slice-grid-overlay";
          gridOverlay.style.setProperty("--voxcss-grid-x", `${cellWidth}px`);
          gridOverlay.style.setProperty("--voxcss-grid-y", `${cellHeight}px`);
          gridOverlay.style.setProperty("--voxcss-grid-line", `${gridLine}px`);

          if (slice.type === "layer") {
            const hostClone = slice.host instanceof HTMLElement
              ? createSliceHostClone(slice.host, [])
              : document.createElement("div");
            const clone = slice.node.cloneNode(true);
            if (clone instanceof HTMLElement) {
              clone.style.transform = "none";
            }
            hostClone.appendChild(clone);
            scene.appendChild(hostClone);
          } else {
            const hostClone = createSliceHostClone(slice.host, slice.faces);
            scene.appendChild(hostClone);
          }

          rotator.appendChild(scene);
          rotator.appendChild(gridOverlay);
          content.appendChild(rotator);
          preview.appendChild(content);
          row.appendChild(preview);
        }

        sliceGrid.appendChild(row);
      }

      if (sliceMeta) {
        const gridText =
          planeXrayAxis === "z"
            ? `${rowCount}x${colCount}`
            : planeXrayAxis === "x"
              ? `${colCount}x${depthCount}`
              : `${rowCount}x${depthCount}`;
        const sortLabel = sliceReport?.slices?.length ? "score-sorted" : "DOM-derived";
        sliceMeta.textContent = `Axis ${axisLabel} · ${slices.length} slices · grid ${gridText} · ${sortLabel}`;
      }
    }

    const PRESET_BUILDERS = [
      { id: "sample-2", label: "Sample 2x2", build: () => buildSampleCube(2) },
      { id: "sample-3", label: "Sample 3x3", build: () => buildSampleCube(3) },
      { id: "sample-4", label: "Sample 4x4", build: () => buildSampleCube(4) },
      { id: "sample-5", label: "Sample 5x5", build: () => buildSampleCube(5) },
      { id: "sample-6", label: "Sample 6x6", build: () => buildSampleCube(6) },
      { id: "sample-7", label: "Sample 7x7", build: () => buildSampleCube(7) },
      { id: "sample-8", label: "Sample 8x8", build: () => buildSampleCube(8) },
      { id: "sample-9", label: "Sample 9x9", build: () => buildSampleCube(9) },
      { id: "sample-10", label: "Sample 10x10", build: () => buildSampleCube(10) },
      { id: "rect-1x2", label: "Rect 1x2", build: () => buildSampleRect(1, 2) },
      { id: "rect-3x2", label: "Rect 3x2", build: () => buildSampleRect(3, 2) },
      { id: "rect-3x5", label: "Rect 3x5", build: () => buildSampleRect(3, 5) },
