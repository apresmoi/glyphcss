      { id: "rect-2x5", label: "Rect 2x5", build: () => buildSampleRect(2, 5) },
      { id: "area-2x2", label: "Area 2x2 (x2/y2)", build: () => buildPremergedRect(2, 2) },
      { id: "area-3x5", label: "Area 3x5 (x2/y2)", build: () => buildPremergedRect(3, 5) },
      { id: "z2-pillar", label: "Z2 Pillar 1x1x8", build: () => buildZ2Pillar(8) },
      { id: "z2-steps", label: "Z2 Steps 8", build: () => buildZ2Steps(8) },
      { id: "z2-block", label: "Z2 Block 6x6x6", build: () => buildZ2Block(6, 6) },
      { id: "z2-wall", label: "Z2 Wall 1x12x8", build: () => buildZ2Wall(12, 8) },
      { id: "z2-columns", label: "Z2 Columns 6x8", build: () => buildZ2Columns(6, 8) },
      { id: "z2-terrain", label: "Z2 Terrain 10x10", build: () => buildZ2Terrain(10, 8) },
      { id: "z2-floating", label: "Z2 Floating slab 8x8", build: () => buildZ2FloatingSlab(8, 4, 2) },
      { id: "z2-bridge", label: "Z2 Bridge span 10", build: () => buildZ2Bridge(10, 8) }
    ];

    const populatePresetSelect = () => {
      if (!presetSelect) return;
      for (const preset of PRESET_BUILDERS) {
        const option = document.createElement("option");
        option.value = preset.id;
        option.textContent = preset.label;
        presetSelect.appendChild(option);
      }
    };

    const getCameraPreset = (preset) => {
      switch (preset) {
        case "left":
          return { rotX: 90, rotY: 270 };
        case "right":
          return { rotX: 90, rotY: 90 };
        case "top":
          return { rotX: 0, rotY: 0 };
        case "iso":
        default:
          return { rotX: 65, rotY: 45 };
      }
    };

    async function loadModelFromUrl(url) {
      const label = stripVoxExtension(url.split("/").pop() || "model");
      updateStatus(`Loading ${label}...`, "Downloading model");
      try {
        currentZoom = null;
        const response = await fetch(url);
        if (!response.ok) throw new Error(`Failed to load ${url}`);
        const buffer = await response.arrayBuffer();
        const parsed = parseMagicaVoxel(buffer);
        await renderVoxScene(parsed, label);
      } catch (err) {
        console.error(err);
        updateDomStats(null);
        updateStatus("Failed to load model", err instanceof Error ? err.message : String(err), true);
      }
    }

    function destroyRenderer() {
      if (!mountedRenderer) return;
      try {
        mountedRenderer.destroy();
      } catch (err) {
        console.error(err);
      }
      mountedRenderer = null;
      if (root) root.innerHTML = "";
    }

    function destroyReferenceRenderer() {
      if (!referenceRenderer) return;
      try {
        referenceRenderer.destroy();
      } catch (err) {
        console.error(err);
      }
      referenceRenderer = null;
      if (referenceRoot) referenceRoot.innerHTML = "";
    }

    function normalizeRenderer(value) {
      if (value === "react" || value === "vue") return value;
      return "headless";
    }

    function normalizeEngine(value) {
      if (value === "slice") return "slice";
      if (value === "shell") return "shell";
      return "auto";
    }

    function applyEngineOverride(mode) {
      const rootGlobal = typeof globalThis === "undefined" ? null : globalThis;
      if (!rootGlobal) return;
      if (mode === "slice") {
        rootGlobal.__VOXCSS_PLANE_SHELL_RENDERER__ = "slice-renderer";
        rootGlobal.__voxcssSliceVerify = true;
        return;
      }
      if (mode === "shell") {
        rootGlobal.__VOXCSS_PLANE_SHELL_RENDERER__ = "shell";
        rootGlobal.__voxcssSliceVerify = false;
        return;
      }
      delete rootGlobal.__VOXCSS_PLANE_SHELL_RENDERER__;
      delete rootGlobal.__voxcssSliceVerify;
    }

    async function loadReactRuntime() {
      if (!reactRuntimePromise) {
        reactRuntimePromise = Promise.all([
          import("react"),
          import("react-dom/client"),
          import("../../dist/react/index.js")
        ]).then(([reactModule, reactDomModule, voxModule]) => ({
          React: reactModule.default ?? reactModule,
          createRoot: reactDomModule.createRoot,
          VoxCamera: voxModule.VoxCamera,
          VoxScene: voxModule.VoxScene
        }));
      }
      return reactRuntimePromise;
    }

    async function loadVueRuntime() {
      if (!vueRuntimePromise) {
        vueRuntimePromise = Promise.all([import("vue"), import("../../dist/vue/index.js")]).then(([vueModule, voxModule]) => ({
          createApp: vueModule.createApp,
          h: vueModule.h,
          reactive: vueModule.reactive,
          VoxCamera: voxModule.VoxCamera,
          VoxScene: voxModule.VoxScene
        }));
      }
      return vueRuntimePromise;
    }

    function createHeadlessRenderer() {
      root.innerHTML = "";
      const cameraElement = document.createElement("div");
      const camera = createCamera({ element: cameraElement, interactive: true });
      const handle = renderScene({
        element: root,
        camera,
        scene: { voxels: [], showFloor, projection: "cubic", mergeVoxels: false }
      });

      return {
        mode: "headless",
        update({ camera: cameraProps, scene: sceneProps }) {
          camera.update(cameraProps);
          handle.setScene(sceneProps);
        },
        destroy() {
          handle.destroy();
          cameraElement.remove();
          root.innerHTML = "";
        }
      };
    }

    function createReferenceRenderer() {
      if (!referenceRoot) return null;
      referenceRoot.innerHTML = "";
      const cameraElement = document.createElement("div");
      const camera = createCamera({ element: cameraElement, interactive: true });
      const handle = renderScene({
        element: referenceRoot,
        camera,
        scene: { voxels: [], showFloor, projection: "cubic", mergeVoxels: false }
      });

      return {
        mode: "reference",
        update({ camera: cameraProps, scene: sceneProps }) {
          camera.update(cameraProps);
          handle.setScene(sceneProps);
        },
        destroy() {
          handle.destroy();
          referenceRoot.innerHTML = "";
        }
      };
    }

    function ensureReferenceRenderer() {
      if (!referenceRoot) return null;
      if (!referenceRenderer) {
        referenceRenderer = createReferenceRenderer();
      }
      return referenceRenderer;
    }

    async function createReactRenderer() {
      const runtime = await loadReactRuntime();
      root.innerHTML = "";
      const reactRoot = runtime.createRoot(root);
      return {
        mode: "react",
        update({ camera: cameraProps, scene: sceneProps }) {
          reactRoot.render(
            runtime.React.createElement(
              runtime.VoxCamera,
              cameraProps,
              runtime.React.createElement(runtime.VoxScene, sceneProps)
            )
          );
        },
        destroy() {
          reactRoot.unmount();
        }
      };
    }

    async function createVueRenderer() {
      const runtime = await loadVueRuntime();
      root.innerHTML = "";
      const state = runtime.reactive({ camera: {}, scene: {} });
      const app = runtime.createApp({
        setup() {
          return () =>
            runtime.h(runtime.VoxCamera, state.camera, {
              default: () => runtime.h(runtime.VoxScene, state.scene)
            });
        }
      });
      app.mount(root);

      return {
        mode: "vue",
        update({ camera: cameraProps, scene: sceneProps }) {
          Object.assign(state.camera, cameraProps);
          Object.assign(state.scene, sceneProps);
        },
        destroy() {
          app.unmount();
        }
      };
    }

    async function ensureRenderer() {
      const nextMode = normalizeRenderer(rendererMode);
      if (mountedRenderer?.mode === nextMode) return;
      destroyRenderer();
      if (nextMode === "react") {
        mountedRenderer = await createReactRenderer();
        return;
      }
      if (nextMode === "vue") {
        mountedRenderer = await createVueRenderer();
        return;
      }
      mountedRenderer = createHeadlessRenderer();
    }

    async function renderVoxScene(data, label = "Loaded file") {
      const seq = (renderSeq += 1);
      const sourceVoxels = data?.voxels ?? [];
      const forceRender = engineMode !== lastEngineMode;
      const voxels = forceRender ? sourceVoxels.slice() : sourceVoxels;
      const rows = data?.rows;
      const cols = data?.cols;
      const depth = data?.depth;
      const cameraPresetState = getCameraPreset(cameraPreset);

      const zoom = currentZoom ?? computeZoom({ rows, cols, depth });
      currentZoom = zoom;
      syncZoomControl(zoom);
      lastData = { ...data, voxels, rows, cols, depth };
      lastLabel = label;
      lastEngineMode = engineMode;
      applyEngineOverride(engineMode);

      const mergeOption = mergeMode === "2d" || mergeMode === "3d" ? mergeMode : false;
      const hasZ2 = voxels.some((voxel) => voxel && typeof voxel.z2 === "number" && Number.isFinite(voxel.z2));
      const preview2d = mergeMode === "2d" && !hasZ2 ? mergeVoxels(voxels) : null;

      try {
        await ensureRenderer();
      } catch (err) {
        console.error(err);
        updateStatus(
          "Failed to load renderer",
          err instanceof Error ? err.message : `Unknown error while loading ${rendererMode}`,
          true
        );
        return;
      }
      if (seq !== renderSeq) return;
      if (!mountedRenderer) return;

      mountedRenderer.update({
        camera: {
          zoom,
          perspective: false,
          interactive: true,
          rotX: cameraPresetState.rotX,
          rotY: cameraPresetState.rotY,
          animate: animate ? true : false
        },
        scene: {
          voxels,
          rows,
          cols,
          depth,
          showFloor,
          projection,
          mergeVoxels: mergeOption
        }
      });

      const referenceHandle = ensureReferenceRenderer();
      if (referenceHandle) {
        referenceHandle.update({
          camera: {
            zoom,
            perspective: false,
            interactive: true,
            rotX: cameraPresetState.rotX,
            rotY: cameraPresetState.rotY,
            animate: animate ? true : false
          },
          scene: {
            voxels,
            rows,
            cols,
            depth,
            showFloor,
            projection,
            mergeVoxels: mergeOption
          }
        });
      }

      await new Promise((resolve) => requestAnimationFrame(resolve));
      if (seq !== renderSeq) return;

      const sliceSceneEl = root ? root.querySelector(".voxcss-scene") : null;
      const referenceSceneEl = referenceRoot ? referenceRoot.querySelector(".voxcss-scene") : null;
      syncPlaneOutline(sliceSceneEl);
      syncPlaneOutline(referenceSceneEl);
      syncPlaneXray(true);
      buildSlicePanel();
      const totalElements = sliceSceneEl ? sliceSceneEl.querySelectorAll("*").length : 0;
      const voxelElements = sliceSceneEl ? sliceSceneEl.querySelectorAll(".voxcss-cube").length : 0;
      const cubeFaceElements = sliceSceneEl ? sliceSceneEl.querySelectorAll(".voxcss-cube-face").length : 0;
      const layerElements = sliceSceneEl ? sliceSceneEl.querySelectorAll(".voxcss-layer").length : 0;
      const svgElements = sliceSceneEl ? sliceSceneEl.querySelectorAll("svg").length : 0;
      const hasPlaneHosts = sliceSceneEl
        ? !!(sliceSceneEl.querySelector(".voxcss-floor-x") || sliceSceneEl.querySelector(".voxcss-floor-y"))
        : false;
      const sliceReport = engineMode === "slice" ? window.__voxcssLastSliceRendererReport : null;
      const sliceBrushCounts = getSliceBrushCounts(sliceReport);
      const useSliceBrushCounts = engineMode === "slice" && !!sliceBrushCounts;
      const sliceRenderStats = useSliceBrushCounts ? sliceReport?.renderStats : null;
      const totalBrushes = useSliceBrushCounts ? sliceBrushCounts.total : 0;
      const brushes = useSliceBrushCounts ? sliceBrushCounts.brush : 0;
      const stampBrushes = useSliceBrushCounts ? sliceBrushCounts.stamp : 0;
      const svgBrushes = useSliceBrushCounts ? sliceBrushCounts.svg : svgElements;
      const brushPseudos = useSliceBrushCounts ? sliceBrushCounts.pseudoLayers : 0;
      const brushGradients = useSliceBrushCounts ? sliceBrushCounts.gradient : 0;
      const paintCost = Number.isFinite(sliceRenderStats?.paintCost) ? sliceRenderStats.paintCost : null;
      const wastedPaint = Number.isFinite(sliceRenderStats?.wastedPaint) ? sliceRenderStats.wastedPaint : null;
      const wastedPaintRatio = Number.isFinite(sliceRenderStats?.wastedPaintRatio)
        ? sliceRenderStats.wastedPaintRatio
        : null;
      const compositeNodes = Number.isFinite(sliceRenderStats?.compositeNodes) ? sliceRenderStats.compositeNodes : null;
      const forced3d = hasZ2 && (mergeOption === false || mergeOption === "2d");

      updateDomStats({
        totalElements,
        cubes: voxelElements,
        cubeFaces: cubeFaceElements,
        layers: layerElements,
        svgs: svgElements,
        brushPseudos,
        brushGradients,
        paintCost,
        wastedPaint,
        wastedPaintRatio,
        compositeNodes,
        brushes,
        totalBrushes,
        stamps: stampBrushes,
        svgBrushes,
        mergeMode,
        forced3d
      });

      updateStatus(
        `Rendering ${label}`,
        `source ${voxels.length} voxels${preview2d ? ` · 2d merged ${preview2d.length}` : ""}${hasZ2 ? " · z2" : ""} · ${cols}x${rows}x${depth} (mergeVoxels ${mergeMode}${forced3d ? "→3d" : ""}, ${projection}, ${rendererMode}, ${engineMode})`
      );
    }

    async function handleFiles(fileList) {
      const file = fileList?.[0];
      if (!file) return;
      const rawName = file.name || "file.vox";
      const name = stripVoxExtension(rawName);
      const isJson = rawName.toLowerCase().endsWith(".json");
      updateStatus(`Loading ${name}...`, "Reading file");
      try {
        currentZoom = null;
        if (isJson) {
          const text = await file.text();
          const parsed = JSON.parse(text);
          if (!parsed || typeof parsed !== "object" || !Array.isArray(parsed.voxels)) {
            throw new Error("Invalid JSON payload (expected { voxels: [...] })");
          }
          await renderVoxScene(parsed, name);
          return;
        }
        const buffer = await file.arrayBuffer();
        const parsed = parseMagicaVoxel(buffer);
        await renderVoxScene(parsed, name);
      } catch (err) {
        console.error(err);
        updateDomStats(null);
        updateStatus(`Failed to load ${name}`, err instanceof Error ? err.message : String(err), true);
      }
    }

    function syncZoomControl(value) {
      if (!Number.isFinite(value)) return;
      zoomInput.value = value.toFixed(2);
      zoomValue.textContent = value.toFixed(2);
    }

    function updateStatus(line, detail, isError = false) {
      if (!statsEl) return;
      const status = [line, detail].filter(Boolean).join(" · ");
      statsEl.title = status;
      statsEl.classList.toggle("error", isError);
    }

    function setActiveButton(group, key, value) {
      if (!group) return;
      for (const button of group.querySelectorAll("button")) {
        button.classList.toggle("active", button.dataset[key] === String(value));
      }
    }

    function syncPlaneOutline(sceneEl) {
      if (sceneEl && sceneEl instanceof HTMLElement) {
        sceneEl.classList.toggle("voxcss-debug-plane-outline", planeOutline);
      }
    }

    function syncPlaneOutlineAll() {
      syncPlaneOutline(root ? root.querySelector(".voxcss-scene") : null);
      syncPlaneOutline(referenceRoot ? referenceRoot.querySelector(".voxcss-scene") : null);
    }

    function syncPlaneXrayControls() {
      if (!planeXrayControls) return;
      planeXrayControls.hidden = viewMode !== "xray";
    }

    function syncXrayFocus() {
      if (document?.body) {
        document.body.classList.toggle("voxcss-xray-slices", viewMode === "xray");
      }
    }

    function syncSlicePanelOffset() {
      if (!document?.body) return;
      if (viewMode !== "xray") {
        document.body.style.removeProperty("--slice-offset-left");
        return;
      }
      const hudRect = hudPanel instanceof HTMLElement ? hudPanel.getBoundingClientRect() : null;
      const left = Math.min((hudRect?.right ?? 0) + 16, window.innerWidth);
      document.body.style.setProperty("--slice-offset-left", `${left}px`);
    }


    function scaleTranslateZ(transform, multiplier) {
      if (!transform) return transform;
      const match = transform.match(/translateZ\((-?\d+(?:\.\d+)?)px\)/);
      if (!match) return transform;
      const base = Number(match[1]);
      if (!Number.isFinite(base)) return transform;
      const scaled = base * multiplier;
      const formatted = Number.isInteger(scaled) ? String(scaled) : scaled.toFixed(2);
      return transform.replace(match[0], `translateZ(${formatted}px)`);
    }

    function resetPlaneXray(sceneEl) {
      if (!sceneEl) return;
      if (!sceneEl.classList.contains("voxcss-plane-xray") && sceneEl.dataset.xrayAxis === undefined) {
        return;
      }
      sceneEl.classList.remove("voxcss-plane-xray");
      delete sceneEl.dataset.xrayAxis;
      const hosts = [
        sceneEl.querySelector(".voxcss-floor-x"),
        sceneEl.querySelector(".voxcss-floor-y"),
        sceneEl.querySelector(".voxcss-floor-z")
      ];
      for (const host of hosts) {
        if (!(host instanceof HTMLElement)) continue;
        if (host.dataset.xrayDisplay === undefined) continue;
        const prior = host.dataset.xrayDisplay;
        if (prior) {
          host.style.display = prior;
        } else {
          host.style.removeProperty("display");
        }
        delete host.dataset.xrayDisplay;
      }
      const adjusted = sceneEl.querySelectorAll("[data-xray-base-transform], [data-xray-base-z]");
      for (const el of adjusted) {
        if (!(el instanceof HTMLElement) && !(el instanceof SVGElement)) continue;
        const baseTransform = el.dataset.xrayBaseTransform;
        if (baseTransform !== undefined) {
          if (baseTransform) el.style.transform = baseTransform;
          else el.style.removeProperty("transform");
          delete el.dataset.xrayBaseTransform;
        }
        const baseZ = el.dataset.xrayBaseZ;
        if (baseZ !== undefined) {
          if (baseZ) el.style.setProperty("--vox-z", baseZ);
          else el.style.removeProperty("--vox-z");
          delete el.dataset.xrayBaseZ;
        }
      }
    }

    function getSceneElements() {
      if (!root) return [];
      return Array.from(root.querySelectorAll(".voxcss-scene")).filter((el) => el instanceof HTMLElement);
    }

    function syncPlaneXray(refreshBase = false) {
      const scenes = getSceneElements();
      if (!scenes.length) return;
      if (viewMode !== "xray") {
        for (const sceneEl of scenes) {
          resetPlaneXray(sceneEl);
        }
        return;
      }
      for (const sceneEl of scenes) {
        sceneEl.classList.add("voxcss-plane-xray");
        sceneEl.dataset.xrayAxis = planeXrayAxis;
        if (refreshBase) {
          const stale = sceneEl.querySelectorAll("[data-xray-base-transform]");
          for (const el of stale) {
            if (el instanceof HTMLElement || el instanceof SVGElement) {
              delete el.dataset.xrayBaseTransform;
            }
          }
        }
        const xHost = sceneEl.querySelector(".voxcss-floor-x");
        const yHost = sceneEl.querySelector(".voxcss-floor-y");
        const zHost = sceneEl.querySelector(".voxcss-floor-z");
        const hasPlaneHosts = !!xHost || !!yHost;

        const setHostVisibility = (host, visible) => {
          if (!(host instanceof HTMLElement)) return;
          if (host.dataset.xrayDisplay === undefined) {
            host.dataset.xrayDisplay = host.style.display;
          }
          if (visible) {
            const prior = host.dataset.xrayDisplay;
            if (prior) {
              host.style.display = prior;
            } else if (hasPlaneHosts) {
              host.style.display = "grid";
            } else {
              host.style.removeProperty("display");
            }
          } else {
            host.style.display = "none";
          }
        };

        setHostVisibility(xHost, planeXrayAxis === "x");
        setHostVisibility(yHost, planeXrayAxis === "y");
        setHostVisibility(zHost, planeXrayAxis === "z");

        const selector =
          planeXrayAxis === "x"
            ? ".voxcss-floor-x .voxcss-plane, .voxcss-floor-x .voxcss-brush, .voxcss-floor-x svg"
            : planeXrayAxis === "y"
              ? ".voxcss-floor-y .voxcss-plane, .voxcss-floor-y .voxcss-brush, .voxcss-floor-y svg"
              : ".voxcss-floor-z .voxcss-layer, .voxcss-floor-z .voxcss-plane, .voxcss-floor-z .voxcss-brush, .voxcss-floor-z svg";
        const targets = sceneEl.querySelectorAll(selector);
        for (const el of targets) {
          if (!(el instanceof HTMLElement) && !(el instanceof SVGElement)) continue;
          if (el.classList.contains("voxcss-brush")) {
            const baseZ = el.dataset.xrayBaseZ ?? el.style.getPropertyValue("--vox-z");
            const parsed = parseCssPx(baseZ);
            if (parsed === null) continue;
            if (el.dataset.xrayBaseZ === undefined || refreshBase) {
              el.dataset.xrayBaseZ = baseZ;
            }
            el.style.setProperty("--vox-z", `${(parsed * XRAY_SPACING).toFixed(3)}px`);
            continue;
          }
          const base = el.dataset.xrayBaseTransform ?? el.style.transform;
          if (!base || !base.includes("translateZ")) continue;
          if (el.dataset.xrayBaseTransform === undefined || refreshBase) {
            el.dataset.xrayBaseTransform = base;
          }
          el.style.transform = scaleTranslateZ(base, XRAY_SPACING);
        }
      }
    }

    window.addEventListener("dragenter", (event) => {
      event.preventDefault();
    });

    window.addEventListener("dragover", (event) => {
      event.preventDefault();
    });

    window.addEventListener("dragleave", (event) => {
      event.preventDefault();
    });

    window.addEventListener("drop", (event) => {
      event.preventDefault();
      void handleFiles(event.dataTransfer?.files);
    });

    fileInput.addEventListener("change", (event) => {
      const input = event.target;
      void handleFiles(input.files);
      input.value = "";
    });

    setActiveButton(mergeModes, "merge", mergeMode);
    setActiveButton(rendererModes, "renderer", rendererMode);
    setActiveButton(viewModes, "view", viewMode);
    setActiveButton(planeXrayAxisButtons, "axis", planeXrayAxis);
    if (engineSelect) {
      engineSelect.value = engineMode;
      applyEngineOverride(engineMode);
    }
    syncPlaneXrayControls();
    if (planeOutlineButton) {
      planeOutlineButton.classList.toggle("active", planeOutline);
    }
    syncPlaneOutlineAll();
    syncPlaneXray();
    syncXrayFocus();
    buildSlicePanel();
    if (hudPaddingToggleButton && hudPanel) {
      hudPaddingToggleButton.classList.toggle("active", hudPanel.classList.contains("hud--spacious"));
    }
    if (floorToggleButton) {
      floorToggleButton.classList.toggle("active", showFloor);
    }
    setActiveButton(cameraButtons, "camera", cameraPreset);
    populatePresetSelect();

    document.body.classList.add("voxcss-pe-all");

    zoomInput.addEventListener("input", (event) => {
      const value = Number(event.target.value);
      if (!Number.isFinite(value)) return;
      currentZoom = value;
      syncZoomControl(value);
      void renderVoxScene(lastData, lastLabel);
    });

    planeOutlineButton.addEventListener("click", () => {
      planeOutline = !planeOutline;
      planeOutlineButton.classList.toggle("active", planeOutline);
      syncPlaneOutlineAll();
    });

    floorToggleButton.addEventListener("click", () => {
      showFloor = !showFloor;
      floorToggleButton.classList.toggle("active", showFloor);
      void renderVoxScene(lastData, lastLabel);
    });

    if (hudPaddingToggleButton && hudPanel) {
      hudPaddingToggleButton.addEventListener("click", () => {
        const isSpacious = hudPanel.classList.toggle("hud--spacious");
        hudPaddingToggleButton.classList.toggle("active", isSpacious);
      });
    }

    animateInput.addEventListener("change", (event) => {
      animate = event.target.checked;
      if (animate) startFpsMonitor();
      else stopFpsMonitor();
      void renderVoxScene(lastData, lastLabel);
    });

    if (animate) startFpsMonitor();

    mergeModes.addEventListener("click", (event) => {
      const target = event.target;
      if (!(target instanceof HTMLButtonElement)) return;
      const mode = target.dataset.merge;
      if (!mode) return;
      mergeMode = mode;
      setActiveButton(mergeModes, "merge", mergeMode);
      void renderVoxScene(lastData, lastLabel);
    });


    rendererModes.addEventListener("click", (event) => {
      const target = event.target;
      if (!(target instanceof HTMLButtonElement)) return;
      const value = target.dataset.renderer;
      if (!value) return;
      const nextMode = normalizeRenderer(value);
      if (nextMode === rendererMode) return;
      rendererMode = nextMode;
      setActiveButton(rendererModes, "renderer", rendererMode);
      void renderVoxScene(lastData, lastLabel);
    });

    if (engineSelect) {
      engineSelect.addEventListener("change", (event) => {
        const value = event.target.value;
        const nextMode = normalizeEngine(value);
        if (nextMode === engineMode) return;
        engineMode = nextMode;
        applyEngineOverride(engineMode);
        void renderVoxScene(lastData, lastLabel);
      });
    }

    if (viewModes) {
      viewModes.addEventListener("click", (event) => {
        const target = event.target;
        if (!(target instanceof HTMLButtonElement)) return;
        const value = target.dataset.view;
        if (!value) return;
        if (value === viewMode) return;
        viewMode = value;
        setActiveButton(viewModes, "view", viewMode);
        syncPlaneXrayControls();
        syncPlaneXray();
        syncXrayFocus();
        syncSlicePanelOffset();
        buildSlicePanel();
      });
    }

    if (openXrayButton) {
      openXrayButton.addEventListener("click", () => {
        if (viewMode === "xray") return;
        viewMode = "xray";
        syncPlaneXrayControls();
        syncPlaneXray();
        syncXrayFocus();
        syncSlicePanelOffset();
        buildSlicePanel();
      });
    }

    if (planeXrayAxisButtons) {
      planeXrayAxisButtons.addEventListener("click", (event) => {
        const target = event.target;
        if (!(target instanceof HTMLButtonElement)) return;
        const value = target.dataset.axis;
        if (!value) return;
        if (value === planeXrayAxis) return;
        planeXrayAxis = value;
        setActiveButton(planeXrayAxisButtons, "axis", planeXrayAxis);
        syncPlaneXray();
        buildSlicePanel();
      });
    }

    presetSelect.addEventListener("change", async (event) => {
      const value = event.target.value;
      if (!value) return;
      const preset = PRESET_BUILDERS.find((entry) => entry.id === value);
      if (!preset) return;
      const sample = preset.build();
      await renderVoxScene(sample, sample.label);
      updateStatus(`Loaded ${preset.label}`, "Preset loaded.");
    });

    modelButtons.addEventListener("click", async (event) => {
      const target = event.target;
      if (!(target instanceof HTMLButtonElement)) return;
      const value = target.dataset.model;
      if (!value) return;
      await loadModelFromUrl(value);
    });

    if (cameraButtons) {
      cameraButtons.addEventListener("click", (event) => {
        const target = event.target;
        if (!(target instanceof HTMLButtonElement)) return;
        const value = target.dataset.camera;
        if (!value) return;
        cameraPreset = value;
        setActiveButton(cameraButtons, "camera", cameraPreset);
        void renderVoxScene(lastData, lastLabel);
      });
    }

    window.addEventListener("resize", () => {
      if (viewMode !== "xray") return;
      buildSlicePanel();
    });

    function buildSampleCube(size) {
      const offset = 2;
      const voxels = [];
      const bottom = "#38bdf8";
      const top = "#fb7185";
      for (let x = offset; x < offset + size; x += 1) {
        for (let y = offset; y < offset + size; y += 1) {
          voxels.push({ x, y, z: 0, color: bottom });
          voxels.push({ x, y, z: 1, color: top });
        }
      }
      const span = size + offset;
      return {
        voxels,
        rows: span + 2,
        cols: span + 2,
        depth: size + 2,
        label: `${size}x${size} sample`
      };
    }

    function buildSampleRect(width, height) {
      const offset = 2;
      const voxels = [];
      const bottom = "#38bdf8";
      const top = "#fb7185";
      for (let x = offset; x < offset + height; x += 1) {
        for (let y = offset; y < offset + width; y += 1) {
          voxels.push({ x, y, z: 0, color: bottom });
          voxels.push({ x, y, z: 1, color: top });
        }
      }
      const rows = height + offset + 2;
      const cols = width + offset + 2;
      const depth = Math.max(height, width) + 2;
      return {
        voxels,
        rows,
        cols,
        depth,
        label: `${width}x${height} sample`
      };
    }

    function buildPremergedRect(width, height) {
      const offset = 2;
      const bottom = "#38bdf8";
      const top = "#fb7185";
      const voxels = [
        { x: offset, y: offset, z: 0, x2: offset + height, y2: offset + width, color: bottom },
        { x: offset, y: offset, z: 1, x2: offset + height, y2: offset + width, color: top }
      ];
      const rows = height + offset + 2;
      const cols = width + offset + 2;
      const depth = Math.max(height, width) + 2;
      return {
        voxels,
        rows,
        cols,
        depth,
        label: `${width}x${height} premerged`
      };
    }

    function buildZ2Pillar(height) {
      const offset = 2;
      const x = offset + 2;
      const y = offset + 2;
      const voxels = [{ x, y, z: 0, z2: height, color: "#a78bfa" }];
      return {
        voxels,
        rows: x + 4,
        cols: y + 4,
        depth: height + 2,
        label: `z2 pillar ${height}`
      };
    }

    function buildZ2Steps(steps) {
      const offset = 2;
      const startX = offset + 2;
      const startY = offset + 1;
      const voxels = [];
      for (let i = 0; i < steps; i += 1) {
        const t = steps <= 1 ? 0 : i / (steps - 1);
        const hue = Math.round(200 - t * 120);
        voxels.push({
          x: startX,
          y: startY + i,
          z: 0,
          z2: i + 1,
          color: `hsl(${hue} 90% 70%)`
        });
      }
      return {
        voxels,
        rows: startX + 5,
        cols: startY + steps + 3,
        depth: steps + 2,
        label: `z2 steps ${steps}`
      };
    }

    function buildZ2Block(size, height) {
      const offset = 2;
      const voxels = [
        {
          x: offset,
          y: offset,
          z: 0,
          x2: offset + size,
          y2: offset + size,
          z2: height,
          color: "#22c55e"
        }
      ];
      return {
        voxels,
        rows: offset + size + 2,
        cols: offset + size + 2,
        depth: height + 2,
        label: `z2 block ${size}x${size}x${height}`
      };
    }

    function buildZ2Wall(length, height) {
      const offset = 2;
      const x = offset + 2;
      const y = offset + 1;
      const voxels = [
        {
          x,
          y,
          z: 0,
          x2: x + 1,
          y2: y + length,
          z2: height,
          color: "#f97316"
        }
      ];
      return {
        voxels,
        rows: x + 4,
        cols: y + length + 2,
        depth: height + 2,
        label: `z2 wall ${length}x${height}`
      };
    }

    function buildZ2Columns(count, height) {
      const offset = 2;
      const x = offset + 2;
      const startY = offset;
      const spacing = 2;
      const voxels = [];
      for (let i = 0; i < count; i += 1) {
        const y = startY + i * spacing;
        const hue = Math.round(260 - (i / Math.max(1, count - 1)) * 160);
        voxels.push({ x, y, z: 0, z2: height, color: `hsl(${hue} 90% 70%)` });
      }
      return {
        voxels,
        rows: x + 4,
        cols: startY + (count - 1) * spacing + 3,
        depth: height + 2,
        label: `z2 columns ${count}x${height}`
      };
    }

    function buildZ2Terrain(size, maxHeight) {
      const offset = 2;
      const voxels = [];
      for (let x = 0; x < size; x += 1) {
        for (let y = 0; y < size; y += 1) {
          const wave = (Math.sin(x * 0.7) + Math.cos(y * 0.6) + 2) / 4;
          const h = 1 + Math.max(0, Math.floor(wave * maxHeight));
          const lightness = 55 + Math.round((h / Math.max(1, maxHeight)) * 20);
          voxels.push({
            x: offset + x,
            y: offset + y,
            z: 0,
            z2: h,
            color: `hsl(140 70% ${lightness}%)`
          });
        }
      }
      return {
        voxels,
        rows: offset + size + 2,
        cols: offset + size + 2,
        depth: maxHeight + 2,
        label: `z2 terrain ${size}x${size}`
      };
    }

    function buildZ2FloatingSlab(size, zStart, thickness) {
      const offset = 2;
      const z2 = zStart + Math.max(1, thickness);
      const voxels = [
        {
          x: offset,
          y: offset,
          z: zStart,
          x2: offset + size,
          y2: offset + size,
          z2,
          color: "#60a5fa"
        }
      ];
      return {
        voxels,
        rows: offset + size + 2,
        cols: offset + size + 2,
        depth: z2 + 2,
        label: `z2 floating ${size}x${size} z${zStart}..${z2}`
      };
    }

    function buildZ2Bridge(span, height) {
      const offset = 2;
      const x = offset + 3;
      const y1 = offset + 2;
      const y2 = y1 + Math.max(2, span) - 1;
      const deckStart = Math.max(0, height - 2);
      const voxels = [
        { x, y: y1, z: 0, z2: height, color: "#f472b6" },
        { x, y: y2, z: 0, z2: height, color: "#f472b6" },
        {
          x,
          y: y1,
          z: deckStart,
          x2: x + 1,
          y2: y2 + 1,
          z2: height,
          color: "#fb7185"
        }
      ];
      return {
        voxels,
        rows: x + 4,
        cols: y2 + 4,
        depth: height + 2,
        label: `z2 bridge span ${span} height ${height}`
      };
    }

    // Initial mount with default model.
    void loadModelFromUrl(DEFAULT_MODEL_URL).catch(() => {
      void renderVoxScene(SAMPLE, SAMPLE.label);
    });
  </script>
</body>

</html>
