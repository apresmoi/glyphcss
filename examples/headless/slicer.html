<!doctype html>
<html lang="en">

<head>
  <meta charset="utf-8" />
  <title>polycss - VOX viewer</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <script type="importmap">
    {
      "imports": {
        "@polycss/core": "../../packages/core/dist/index.js"
      }
    }
  </script>
  <style>
    :root {
      color-scheme: dark;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      --bg: #11100d;
      --panel: #1b1a16;
      --panel-2: #242219;
      --line: #3a3528;
      --text: #f4efe4;
      --muted: #b8ad96;
      --subtle: #817865;
      --accent: #7dd3a7;
      --accent-2: #f6c177;
      --danger: #ff7a7a;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      width: 100%;
      height: 100%;
      margin: 0;
      background: var(--bg);
      color: var(--text);
    }

    body {
      overflow: hidden;
    }

    button,
    input {
      font: inherit;
    }

    button {
      appearance: none;
      border: 1px solid var(--line);
      border-radius: 6px;
      background: #181713;
      color: var(--text);
      min-height: 34px;
      padding: 0 12px;
      cursor: pointer;
    }

    button:hover,
    button:focus-visible {
      border-color: var(--accent);
      outline: none;
    }

    button.active {
      border-color: var(--accent);
      background: #173027;
      color: #dcffeb;
    }

    .app {
      height: 100%;
      display: grid;
      grid-template-rows: 56px minmax(0, 1fr);
      background: var(--bg);
    }

    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      padding: 0 18px;
      border-bottom: 1px solid var(--line);
      background: #151410;
      min-width: 0;
    }

    .brand {
      display: flex;
      align-items: baseline;
      gap: 10px;
      min-width: 0;
    }

    .brand strong {
      font-size: 15px;
      letter-spacing: 0;
      white-space: nowrap;
    }

    .brand span {
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      color: var(--muted);
      font-size: 13px;
    }

    .actions {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    .main {
      min-height: 0;
      display: grid;
      grid-template-columns: minmax(0, 1fr) 320px;
    }

    .viewport {
      position: relative;
      min-width: 0;
      min-height: 0;
      overflow: hidden;
      background-color: #13120f;
      background-image:
        linear-gradient(rgba(244, 239, 228, 0.045) 1px, transparent 1px),
        linear-gradient(90deg, rgba(244, 239, 228, 0.045) 1px, transparent 1px);
      background-size: 40px 40px;
    }

    #scene {
      position: absolute;
      inset: 0;
      overflow: hidden;
    }

    .drop-overlay {
      position: absolute;
      inset: 18px;
      display: grid;
      place-items: center;
      border: 1px dashed transparent;
      border-radius: 8px;
      color: var(--muted);
      pointer-events: none;
      opacity: 0;
      transition: opacity 120ms ease, border-color 120ms ease, background 120ms ease;
      background: rgba(17, 16, 13, 0.72);
      z-index: 5;
    }

    .drop-overlay strong {
      font-size: clamp(22px, 4vw, 44px);
      letter-spacing: 0;
      color: var(--text);
    }

    .drop-overlay span {
      display: block;
      margin-top: 8px;
      text-align: center;
      color: var(--muted);
      font-size: 14px;
    }

    .viewport.dragging .drop-overlay,
    .viewport.empty .drop-overlay {
      opacity: 1;
      border-color: var(--accent);
    }

    .viewport.empty .drop-overlay {
      background: rgba(17, 16, 13, 0.54);
    }

    .status {
      position: absolute;
      left: 18px;
      bottom: 18px;
      max-width: min(580px, calc(100% - 36px));
      padding: 10px 12px;
      border: 1px solid rgba(58, 53, 40, 0.85);
      border-radius: 8px;
      background: rgba(21, 20, 16, 0.86);
      color: var(--muted);
      font-size: 13px;
      line-height: 1.35;
      z-index: 4;
    }

    .status[data-tone="error"] {
      border-color: rgba(255, 122, 122, 0.55);
      color: #ffd7d7;
    }

    .side {
      min-width: 0;
      overflow: auto;
      border-left: 1px solid var(--line);
      background: var(--panel);
      padding: 18px;
    }

    .section {
      padding: 0 0 18px;
      margin: 0 0 18px;
      border-bottom: 1px solid var(--line);
    }

    .section:last-child {
      margin-bottom: 0;
      border-bottom: 0;
    }

    .section h2 {
      margin: 0 0 12px;
      color: var(--subtle);
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
    }

    .sample-list,
    .segmented,
    .view-buttons {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .segmented button {
      flex: 1 1 74px;
    }

    .view-buttons button {
      flex: 1 1 64px;
    }

    .field {
      display: grid;
      grid-template-columns: 76px minmax(0, 1fr) 52px;
      align-items: center;
      gap: 10px;
      margin-top: 12px;
      color: var(--muted);
      font-size: 13px;
    }

    .field input[type="range"] {
      width: 100%;
      accent-color: var(--accent);
    }

    .field output {
      color: var(--text);
      font-variant-numeric: tabular-nums;
      text-align: right;
    }

    .stats {
      display: grid;
      grid-template-columns: 1fr;
      gap: 8px;
    }

    .stat {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      gap: 12px;
      padding: 8px 0;
      border-bottom: 1px solid rgba(58, 53, 40, 0.55);
      min-width: 0;
    }

    .stat:last-child {
      border-bottom: 0;
    }

    .stat span {
      color: var(--muted);
      font-size: 13px;
    }

    .stat b {
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      color: var(--text);
      font-size: 13px;
      font-variant-numeric: tabular-nums;
      text-align: right;
    }

    .warnings {
      margin: 10px 0 0;
      padding: 0;
      list-style: none;
      color: var(--danger);
      font-size: 12px;
      line-height: 1.35;
    }

    .warnings li + li {
      margin-top: 6px;
    }

    #file-input {
      display: none;
    }

    @media (max-width: 860px) {
      .app {
        grid-template-rows: auto minmax(0, 1fr);
      }

      .topbar {
        align-items: flex-start;
        flex-direction: column;
        padding: 12px;
      }

      .actions {
        justify-content: flex-start;
      }

      .main {
        grid-template-columns: 1fr;
        grid-template-rows: minmax(0, 1fr) minmax(220px, 38vh);
      }

      .side {
        border-left: 0;
        border-top: 1px solid var(--line);
        padding: 14px;
      }
    }
  </style>
</head>

<body>
  <div class="app">
    <header class="topbar">
      <div class="brand">
        <strong>VOX Viewer</strong>
        <span id="title-detail">Loading sample</span>
      </div>
      <div class="actions">
        <button id="browse" type="button">Browse</button>
        <button id="fit" type="button">Fit</button>
        <button id="reset" type="button">Reset</button>
      </div>
    </header>

    <main class="main">
      <section id="viewport" class="viewport empty" aria-label="VOX model viewport">
        <div id="scene"></div>
        <div class="drop-overlay" aria-hidden="true">
          <div>
            <strong>Drop .vox</strong>
            <span>or use Browse</span>
          </div>
        </div>
        <div id="status" class="status">Loading bundled sample...</div>
      </section>

      <aside class="side">
        <section class="section">
          <h2>Samples</h2>
          <div id="samples" class="sample-list"></div>
        </section>

        <section class="section">
          <h2>View</h2>
          <div id="views" class="view-buttons" role="group" aria-label="View preset">
            <button type="button" data-view="iso" class="active">Iso</button>
            <button type="button" data-view="front">Front</button>
            <button type="button" data-view="side">Side</button>
            <button type="button" data-view="top">Top</button>
          </div>
          <label class="field">
            <span>Zoom</span>
            <input id="zoom" type="range" min="0.04" max="1.2" step="0.01" value="0.18" />
            <output id="zoom-out">0.18</output>
          </label>
          <label class="field">
            <span>Tilt</span>
            <input id="rot-x" type="range" min="0" max="100" step="1" value="65" />
            <output id="rot-x-out">65</output>
          </label>
          <label class="field">
            <span>Spin</span>
            <input id="rot-y" type="range" min="0" max="359" step="1" value="45" />
            <output id="rot-y-out">45</output>
          </label>
        </section>

        <section class="section">
          <h2>Stats</h2>
          <div class="stats">
            <div class="stat"><span>File</span><b id="stat-file">-</b></div>
            <div class="stat"><span>Voxels</span><b id="stat-voxels">-</b></div>
            <div class="stat"><span>Polygons</span><b id="stat-polygons">-</b></div>
            <div class="stat"><span>DOM nodes</span><b id="stat-dom">-</b></div>
            <div class="stat"><span>Bounds</span><b id="stat-bounds">-</b></div>
            <div class="stat"><span>Parse</span><b id="stat-parse">-</b></div>
            <div class="stat"><span>Bytes</span><b id="stat-bytes">-</b></div>
          </div>
          <ul id="warnings" class="warnings"></ul>
        </section>
      </aside>
    </main>
  </div>

  <input id="file-input" type="file" accept=".vox" />

  <script type="module">
    import { computeSceneBbox, createPolyScene, createPolyControls, parseVox } from "../../packages/polycss/dist/index.js";

    const SAMPLES = [
      ["army", "/examples/models/army.vox"],
      ["bus", "/examples/models/bus.vox"],
      ["house", "/examples/models/house.vox"],
      ["sky", "/examples/models/skyscraper.vox"],
      ["tank", "/examples/models/tank.vox"],
      ["tree", "/examples/models/tree.vox"]
    ];

    const sceneHost = document.getElementById("scene");
    const viewport = document.getElementById("viewport");
    const fileInput = document.getElementById("file-input");
    const browseButton = document.getElementById("browse");
    const fitButton = document.getElementById("fit");
    const resetButton = document.getElementById("reset");
    const titleDetail = document.getElementById("title-detail");
    const status = document.getElementById("status");
    const sampleList = document.getElementById("samples");
    const viewGroup = document.getElementById("views");
    const zoomInput = document.getElementById("zoom");
    const rotXInput = document.getElementById("rot-x");
    const rotYInput = document.getElementById("rot-y");
    const zoomOut = document.getElementById("zoom-out");
    const rotXOut = document.getElementById("rot-x-out");
    const rotYOut = document.getElementById("rot-y-out");
    const warningsEl = document.getElementById("warnings");

    const statFile = document.getElementById("stat-file");
    const statVoxels = document.getElementById("stat-voxels");
    const statPolygons = document.getElementById("stat-polygons");
    const statDom = document.getElementById("stat-dom");
    const statBounds = document.getElementById("stat-bounds");
    const statParse = document.getElementById("stat-parse");
    const statBytes = document.getElementById("stat-bytes");

    const state = {
      scene: null,
      mesh: null,
      parsed: null,
      label: "",
      activeSample: "",
      parseMs: 0,
      rotX: 65,
      rotY: 45,
      zoom: 0.18
    };

    for (const [label, url] of SAMPLES) {
      const button = document.createElement("button");
      button.type = "button";
      button.textContent = label;
      button.dataset.url = url;
      button.dataset.label = label;
      sampleList.appendChild(button);
    }

    function formatNumber(value) {
      return Number.isFinite(value) ? value.toLocaleString() : "-";
    }

    function formatBytes(bytes) {
      if (!Number.isFinite(bytes)) return "-";
      if (bytes < 1024) return `${bytes} B`;
      if (bytes < 1024 * 1024) return `${(bytes / 1024).toFixed(1)} KB`;
      return `${(bytes / 1024 / 1024).toFixed(2)} MB`;
    }

    function formatMs(ms) {
      return Number.isFinite(ms) ? `${ms.toFixed(ms < 10 ? 1 : 0)} ms` : "-";
    }

    function setStatus(message, tone = "normal") {
      status.textContent = message;
      status.dataset.tone = tone;
    }

    function sceneOptions() {
      return {
        perspective: false,
        rotX: state.rotX,
        rotY: state.rotY,
        zoom: state.zoom,
        domCullBackfaces: true,
        autoCenter: true,
        atlasScale: "auto"
      };
    }

    function fitZoom() {
      const rect = viewport.getBoundingClientRect();
      const shortSide = Math.max(240, Math.min(rect.width, rect.height));
      const modelPixels = 60 * 50;
      return clamp(shortSide * 0.74 / modelPixels, 0.06, 0.48);
    }

    function clamp(value, min, max) {
      return Math.max(min, Math.min(max, value));
    }

    function updateControls() {
      zoomInput.value = state.zoom.toFixed(2);
      rotXInput.value = String(Math.round(state.rotX));
      rotYInput.value = String(Math.round(state.rotY));
      zoomOut.textContent = state.zoom.toFixed(2);
      rotXOut.textContent = String(Math.round(state.rotX));
      rotYOut.textContent = String(Math.round(state.rotY));
    }

    function setActiveSample(url) {
      state.activeSample = url;
      for (const button of sampleList.querySelectorAll("button")) {
        button.classList.toggle("active", button.dataset.url === url);
      }
    }

    function setActiveView(view) {
      for (const button of viewGroup.querySelectorAll("button")) {
        button.classList.toggle("active", button.dataset.view === view);
      }
    }

    function updateStats() {
      const parsed = state.parsed;
      if (!parsed) {
        statFile.textContent = "-";
        statVoxels.textContent = "-";
        statPolygons.textContent = "-";
        statDom.textContent = "-";
        statBounds.textContent = "-";
        statParse.textContent = "-";
        statBytes.textContent = "-";
        warningsEl.replaceChildren();
        return;
      }

      const bbox = computeSceneBbox(parsed.polygons);
      const size = [
        bbox.max[0] - bbox.min[0],
        bbox.max[1] - bbox.min[1],
        bbox.max[2] - bbox.min[2]
      ].map((n) => Math.round(n * 10) / 10);
      const voxelCount = parsed.metadata?.voxelCount;

      statFile.textContent = state.label;
      statVoxels.textContent = formatNumber(typeof voxelCount === "number" ? voxelCount : NaN);
      statPolygons.textContent = formatNumber(parsed.polygons.length);
      statBounds.textContent = size.join(" x ");
      statParse.textContent = formatMs(state.parseMs);
      statBytes.textContent = formatBytes(parsed.metadata?.sourceBytes);

      const warnings = parsed.warnings ?? [];
      warningsEl.replaceChildren(...warnings.slice(0, 4).map((warning) => {
        const li = document.createElement("li");
        li.textContent = warning;
        return li;
      }));
    }

    function updateDomStatsSoon() {
      window.setTimeout(() => {
        const count = sceneHost.querySelectorAll(".polycss-scene i").length;
        statDom.textContent = formatNumber(count);
      }, 120);
    }

    function destroyScene() {
      if (state.controls) {
        state.controls.destroy();
        state.controls = null;
      }
      if (!state.scene) return;
      state.scene.destroy();
      state.scene = null;
      state.mesh = null;
      sceneHost.innerHTML = "";
    }

    function mountScene() {
      destroyScene();
      if (!state.parsed) {
        viewport.classList.add("empty");
        return;
      }

      viewport.classList.remove("empty");
      state.scene = createPolyScene(sceneHost, sceneOptions());
      state.controls = createPolyControls(state.scene, { drag: true, wheel: true });
      state.mesh = state.scene.add(state.parsed);
      titleDetail.textContent = state.label;
      updateControls();
      updateStats();
      updateDomStatsSoon();
      setStatus(`${state.label} ready`);
    }

    function applyView(partial) {
      Object.assign(state, partial);
      state.scene?.setOptions(sceneOptions());
      updateControls();
      updateDomStatsSoon();
    }

    function resetView() {
      applyView({ rotX: 65, rotY: 45, zoom: fitZoom() });
      setActiveView("iso");
    }

    function parseBuffer(buffer, label) {
      const started = performance.now();
      const parsed = parseVox(buffer, { targetSize: 60 });
      const parseMs = performance.now() - started;
      if (!parsed.polygons.length) {
        const warning = parsed.warnings?.[0] ?? "No visible voxels found";
        throw new Error(warning);
      }
      state.parsed = parsed;
      state.label = label;
      state.parseMs = parseMs;
      state.zoom = fitZoom();
      state.rotX = 65;
      state.rotY = 45;
      setActiveView("iso");
      mountScene();
    }

    async function loadUrl(url, label) {
      setStatus(`Loading ${label}...`);
      const response = await fetch(url);
      if (!response.ok) throw new Error(`Fetch failed: ${response.status}`);
      const buffer = await response.arrayBuffer();
      parseBuffer(buffer, label);
      setActiveSample(url);
    }

    async function loadFile(file) {
      if (!file) return;
      if (!file.name.toLowerCase().endsWith(".vox")) {
        setStatus("Only .vox files are supported", "error");
        return;
      }
      setStatus(`Loading ${file.name}...`);
      const buffer = await file.arrayBuffer();
      parseBuffer(buffer, file.name);
      setActiveSample("");
    }

    sampleList.addEventListener("click", (event) => {
      const button = event.target.closest("button[data-url]");
      if (!button) return;
      loadUrl(button.dataset.url, button.dataset.label).catch((error) => {
        console.error(error);
        setStatus(error instanceof Error ? error.message : String(error), "error");
      });
    });

    browseButton.addEventListener("click", () => fileInput.click());

    fileInput.addEventListener("change", (event) => {
      const input = event.currentTarget;
      loadFile(input.files?.[0]).catch((error) => {
        console.error(error);
        setStatus(error instanceof Error ? error.message : String(error), "error");
      }).finally(() => {
        input.value = "";
      });
    });

    fitButton.addEventListener("click", () => applyView({ zoom: fitZoom() }));
    resetButton.addEventListener("click", resetView);

    viewGroup.addEventListener("click", (event) => {
      const button = event.target.closest("button[data-view]");
      if (!button) return;
      const view = button.dataset.view;
      setActiveView(view);
      if (view === "top") applyView({ rotX: 0, rotY: 0 });
      else if (view === "front") applyView({ rotX: 90, rotY: 0 });
      else if (view === "side") applyView({ rotX: 90, rotY: 90 });
      else resetView();
    });

    zoomInput.addEventListener("input", () => applyView({ zoom: Number(zoomInput.value) }));
    rotXInput.addEventListener("input", () => {
      setActiveView("");
      applyView({ rotX: Number(rotXInput.value) });
    });
    rotYInput.addEventListener("input", () => {
      setActiveView("");
      applyView({ rotY: Number(rotYInput.value) });
    });

    let dragDepth = 0;

    function isFileDrag(event) {
      return Array.from(event.dataTransfer?.types ?? []).includes("Files");
    }

    window.addEventListener("dragenter", (event) => {
      if (!isFileDrag(event)) return;
      event.preventDefault();
      dragDepth += 1;
      viewport.classList.add("dragging");
    });

    window.addEventListener("dragover", (event) => {
      if (!isFileDrag(event)) return;
      event.preventDefault();
    });

    window.addEventListener("dragleave", (event) => {
      if (!isFileDrag(event)) return;
      event.preventDefault();
      dragDepth = Math.max(0, dragDepth - 1);
      if (dragDepth === 0) viewport.classList.remove("dragging");
    });

    window.addEventListener("drop", (event) => {
      if (!isFileDrag(event)) return;
      event.preventDefault();
      dragDepth = 0;
      viewport.classList.remove("dragging");
      loadFile(event.dataTransfer?.files?.[0]).catch((error) => {
        console.error(error);
        setStatus(error instanceof Error ? error.message : String(error), "error");
      });
    });

    window.addEventListener("resize", () => {
      if (!state.parsed) return;
      applyView({ zoom: fitZoom() });
    });

    loadUrl(SAMPLES[0][1], SAMPLES[0][0]).catch((error) => {
      console.error(error);
      setStatus(error instanceof Error ? error.message : String(error), "error");
      viewport.classList.add("empty");
    });
  </script>
</body>

</html>
