<!doctype html>
<html lang="en">

<head>
  <meta charset="utf-8" />
  <title>VoxCSS</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <style>
    :root {
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: #f8fafc;
      background: #020617;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem 1rem;
    }

    main {
      width: min(900px, 100%);
    }

    p {
      margin: 0 0 1.25rem;
      color: #94a3b8;
      font-size: 0.95rem;
      text-align: center;
    }

    ul {
      list-style: none;
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
      gap: 0.75rem;
      margin: 0;
      padding: 0;
    }

    a {
      display: block;
      text-decoration: none;
      color: inherit;
      padding: 1.25rem 0;
      border-radius: 0.75rem;
      background: #0f172a;
      font-weight: 600;
      text-align: center;
      letter-spacing: 0.02em;
      transition: opacity 120ms ease;
    }

    a:hover,
    a:focus-visible {
      opacity: 0.85;
    }
  </style>
</head>

<body>
  <main>
    <p>Run <code>npm install</code> once, then <code>npm run build</code> whenever you tweak the source so these examples stay in sync with <code>dist/</code>.</p>
    <ul>
      <li>
        <a href="./examples/headless/">
          Headless
        </a>
      </li>
      <li>
        <a href="./examples/react/">
          React 18
        </a>
      </li>
      <li>
        <a href="./examples/vue/">
          Vue 3
        </a>
      </li>
      <li>
        <a href="./examples/vue2/">
          Vue 2
        </a>
      </li>
    </ul>
  </main>
</body>

</html>
