<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>polycss elements smoke test</title>
</head>
<body>
  <h1>polycss/elements smoke test</h1>

  <poly-scene perspective="1000" rot-x="65" rot-y="45" id="scene">
    <poly-polygon
      vertices="[[0,0,0],[1,0,0],[0,1,0]]"
      color="#ff5500">
    </poly-polygon>
  </poly-scene>

  <pre id="results"></pre>

  <script type="module">
    import "../dist/elements.js";

    const out = (msg) => {
      document.getElementById("results").textContent += msg + "\n";
    };

    out("poly-scene defined: " + (customElements.get("poly-scene") !== undefined));
    out("poly-mesh defined:  " + (customElements.get("poly-mesh") !== undefined));
    out("poly-polygon defined: " + (customElements.get("poly-polygon") !== undefined));

    // Wait a tick for connectedCallback chains.
    queueMicrotask(() => {
      const scene = document.getElementById("scene");
      out("scene.getScene() returns SceneHandle: " + !!scene.getScene());
      const polyEls = scene.querySelectorAll(".polycss-scene i");
      out("rendered polygon i elements: " + polyEls.length);
    });
  </script>
</body>
</html>
